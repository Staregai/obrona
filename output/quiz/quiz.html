      els.modeOral.addEventListener("click", () => setMode("oral"));
      els.themeLight.addEventListener("click", () => setTheme("light"));
      els.themeDark.addEventListener("click", () => setTheme("dark"));
      els.editAnswer.addEventListener("click", () => setEditing(true));
      [els.formatBold, els.formatHighlight].forEach(button => {
        button.addEventListener("mousedown", event => event.preventDefault());
      });
      els.formatBold.addEventListener("click", () => formatSelection("bold"));
      els.formatHighlight.addEventListener("click", () => formatSelection("highlight"));
      els.saveNote.addEventListener("click", () => saveEditedAnswer());
      els.cancelEdit.addEventListener("click", cancelEditing);
      els.clearNote.addEventListener("click", clearEditedAnswer);
      window.addEventListener("beforeunload", () => {
        persistEditingIfNeeded();
        saveSession();
      });
    }

    function resetFilteredSession() {
      persistEditingIfNeeded();
      state.index = 0;
      state.answerVisible = false;
      rebuildOrder();
      render();
    }

    function activeDeck() {
      return deckData[state.deck] || deckData.main;
    }

    function activeCards() {
      return activeDeck().cards;
    }

    function activeTopics() {
      return activeDeck().topics;
    }

    function activeCardById() {
      return activeDeck().cardById;
    }

    function blacklistedIds(deck = state.deck) {
      return state.blacklist[deck] || new Set();
    }

    function isCardBlacklisted(id, deck = state.deck) {
      return blacklistedIds(deck).has(id);
    }

    function visibleCards(deck = state.deck) {
      const data = deckData[deck] || deckData.main;
      return data.cards.filter(card => !isCardBlacklisted(card.id, deck));
    }

    function setDeck(deck) {
      if (!VALID_DECKS.includes(deck) || state.deck === deck) return;
      persistEditingIfNeeded();
      state.deck = deck;
      state.index = 0;
      state.order = [];
      state.answerVisible = false;
      state.editing = false;
      state.topics = new Set(activeTopics());
      els.search.value = "";
      syncDeckControls();
      renderTopics();
      rebuildOrder();
      render();
    }

    function syncDeckControls() {
      const isMain = state.deck === "main";
      els.deckMain.classList.toggle("active", isMain);
      els.deckBank.classList.toggle("active", !isMain);
      els.deckMain.setAttribute("aria-selected", String(isMain));
      els.deckBank.setAttribute("aria-selected", String(!isMain));
      els.mainFilterThesis.hidden = !isMain;
      els.mainFilterMini.hidden = !isMain;
      els.mainCommitteeGroup.hidden = !isMain;
      if (!isMain) {
        els.filterThesis.checked = false;
        els.filterMini.checked = false;
        setCommitteeControls(false);
      }
    }

    function setCommitteeControls(checked) {
      Object.values(els.committeeFilters).forEach(input => {
        input.checked = checked;
      });
    }

    function syncCommitteeAllFromDetails() {
      els.committeeFilters.all.checked = COMMITTEE_DETAIL_KEYS.every(key => els.committeeFilters[key]?.checked);
    }

    function setCommitteeFilters(checked) {
      persistEditingIfNeeded();
      setCommitteeControls(checked);
      state.index = 0;
      state.answerVisible = false;
      rebuildOrder();
      render();
    }

    function renderTopics() {
      const counts = countBy(visibleCards(), card => card.topic);
      els.topics.innerHTML = "";
      const topics = Object.keys(counts).sort();
      if (!topics.length) {
        els.topics.innerHTML = `<div class="blacklist-empty">Wszystkie pytania w tej bazie są ukryte.</div>`;
        return;
      }
      topics.forEach(topic => {
        const id = "topic-" + slug(topic);
        const row = document.createElement("label");
        row.className = "topic-row";
        row.innerHTML = `
          <input type="checkbox" id="${id}" ${state.topics.has(topic) ? "checked" : ""}>
          <strong>${escapeHtml(topic)}</strong>
          <span>${counts[topic]}</span>
        `;
        row.querySelector("input").addEventListener("change", event => {
          persistEditingIfNeeded();
          if (event.target.checked) state.topics.add(topic);
          else state.topics.delete(topic);
          state.index = 0;
          state.answerVisible = false;
          rebuildOrder();
          render();
        });
        els.topics.appendChild(row);
      });
    }

    function setAllTopics(selected) {
      persistEditingIfNeeded();
      state.topics = selected ? new Set(activeTopics()) : new Set();
      state.index = 0;
      state.answerVisible = false;
      renderTopics();
      rebuildOrder();
      render();
    }

    function setMode(mode) {
      persistEditingIfNeeded();
      state.mode = mode;
      syncModeButtons();
      render();
    }

    function setTheme(theme) {
      state.theme = theme;
      applyTheme();
      syncThemeButtons();
      saveSession();
    }

    function rebuildOrder(preserveOrder = false) {
      const query = normalize(els.search.value);
      const statusFilters = getSelectedStatusFilters();
      const committeeFilters = getSelectedCommitteeFilters();
      let pool = activeCards().filter(card => {
        if (isCardBlacklisted(card.id)) return false;
        if (!state.topics.has(card.topic)) return false;
        if (state.deck === "main" && els.filterThesis.checked && !isThesisCard(card)) return false;
        if (state.deck === "main" && els.filterMini.checked && !isMiniCard(card)) return false;
        if (state.deck === "main" && committeeFilters.size && !matchesCommitteeFilter(card, committeeFilters)) return false;
        if (statusFilters.size && !matchesStatusFilter(card.id, statusFilters)) return false;
        if (!query) return true;
        return normalize(card.q + " " + getSearchableAnswer(card) + " " + card.topic).includes(query);
      });
      const poolIds = pool.map(card => card.id);
      if (preserveOrder && state.order.length) {
        const poolSet = new Set(poolIds);
        const kept = state.order.filter(id => poolSet.has(id));
        const keptSet = new Set(kept);
        state.order = kept.concat(poolIds.filter(id => !keptSet.has(id)));
      } else {
        if (els.shuffle.checked) pool = shuffle(pool, state.seed);
        state.order = pool.map(card => card.id);
      }
      if (state.index >= state.order.length) state.index = Math.max(0, state.order.length - 1);
      if (state.index < 0) state.index = 0;
    }

    function render() {
      renderStats();
      renderSeed();
      renderBlacklistLists();
      const card = currentCard();
      if (!card) {
        state.editing = false;
        els.cardArea.innerHTML = `<div class="empty">Brak pytań dla wybranych filtrów.</div>`;
        els.counter.textContent = "0 / 0";
        els.topicName.textContent = "-";
        els.progressBar.style.width = "0%";
        toggleAnswerControls(false);
        syncEditControls(null);
        saveSession();
        return;
      }

      const current = state.index + 1;
      const total = state.order.length;
      els.counter.textContent = `${current} / ${total}`;
      els.topicName.textContent = card.topic;
      els.progressBar.style.width = `${Math.round((current / total) * 100)}%`;
      toggleAnswerControls(true);
      updateRatingButtons(getStatus(card.id));
      renderFlash(card, state.mode === "oral");
      syncEditControls(card);
      saveSession();
    }

    function renderFlash(card, oral) {
      const status = getStatus(card.id);
      const answerClasses = ["answer"];
      if (state.answerVisible || state.editing) answerClasses.push("visible");
      const editAttrs = state.editing ? ` contenteditable="true" spellcheck="false" aria-label="Edytowana odpowiedź"` : "";
      els.cardArea.innerHTML = `
        <div class="meta-row">
          <span class="pill">${escapeHtml(card.topic)}</span>
          ${committeeBadges(card).map(label => `<span class="pill note">${escapeHtml(label)}</span>`).join("")}
          ${isMiniCard(card) ? `<span class="pill note">MiNI</span>` : ""}
          ${card.sourceQuestion ? `<span class="pill note">pytanie ${card.sourceQuestion}</span>` : ""}
          ${statusPill(status)}
          ${hasCustomAnswer(card.id) ? `<span class="pill note">notatki</span>` : ""}
        </div>
        <h2 class="question">${escapeHtml(card.q)}</h2>
        <div id="answer" class="${answerClasses.join(" ")}"${editAttrs}>${getAnswerHtml(card)}</div>
      `;
      els.showAnswer.textContent = oral ? "Pokaż konspekt" : "Pokaż odpowiedź";
    }

    function showAnswer() {
      const answer = document.getElementById("answer");
      if (answer) answer.classList.add("visible");
      state.answerVisible = true;
      saveSession();
    }

    function rate(value) {
      const card = currentCard();
      if (!card) return;
      persistEditingIfNeeded();
      mark(card.id, value);
      renderStats();
      if (getSelectedStatusFilters().size) {
        const previousIndex = state.index;
        const previousId = card.id;
        rebuildOrder(true);
        const keptIndex = state.order.indexOf(previousId);
        if (keptIndex >= 0 && state.order.length > 1) {
          state.index = (keptIndex + 1) % state.order.length;
        } else {
          state.index = Math.min(previousIndex, Math.max(0, state.order.length - 1));
        }
        state.answerVisible = false;
        render();
      } else {
        next();
      }
    }

    function mark(id, value) {
      if (!["good", "hard", "bad"].includes(value)) return;
      state.progress[id] = {
        ...(state.progress[id] || {}),
        status: value,
        updatedAt: Date.now()
      };
      saveProgress();
      updateRatingButtons(value);
    }

    function blacklistCurrentCard() {
      const card = currentCard();
      if (!card || isCardBlacklisted(card.id)) return;
      const ok = window.confirm(`Ukryć to pytanie w bazie "${activeDeck().label}"?\n\n${card.q}\n\nPytanie zniknie z losowania, ale będzie można je przywrócić z listy Blacklisted.`);
      if (!ok) return;
      persistEditingIfNeeded();
      state.blacklist[state.deck].add(card.id);
      saveBlacklist();
      state.editing = false;
      state.answerVisible = false;
      rebuildOrder();
      renderTopics();
      render();
    }

    function renderBlacklistLists() {
      renderBlacklistList("main", els.blacklistMain, els.blacklistMainCount, els.restoreMainBlacklist);
      renderBlacklistList("bank", els.blacklistBank, els.blacklistBankCount, els.restoreBankBlacklist);
    }

    function renderBlacklistList(deck, container, countEl, restoreAllButton) {
      const ids = [...blacklistedIds(deck)].filter(id => deckData[deck].cardById.has(id));
      countEl.textContent = String(ids.length);
      restoreAllButton.disabled = ids.length === 0;
      container.innerHTML = "";
      if (!ids.length) {
        container.innerHTML = `<div class="blacklist-empty">Brak ukrytych pytań.</div>`;
        return;
      }
      ids
        .map(id => deckData[deck].cardById.get(id))
        .filter(Boolean)
        .sort((a, b) => a.topic.localeCompare(b.topic, "pl") || a.q.localeCompare(b.q, "pl"))
        .forEach(card => {
          const item = document.createElement("div");
          item.className = "blacklist-item";
          item.innerHTML = `
            <div class="blacklist-question">
              <strong>${escapeHtml(truncateText(card.q, 92))}</strong>
              <div class="blacklist-topic">${escapeHtml(card.topic)}</div>
            </div>
            <button type="button">Przywróć</button>
          `;
          item.querySelector("button").addEventListener("click", () => restoreBlacklisted(deck, card.id));
          container.appendChild(item);
        });
    }

    function restoreBlacklisted(deck, id) {
      if (!state.blacklist[deck]?.has(id)) return;
      state.blacklist[deck].delete(id);
      saveBlacklist();
      renderTopics();
      rebuildOrder(true);
      render();
    }

    function restoreAllBlacklisted(deck) {
      if (!state.blacklist[deck]?.size) return;
      state.blacklist[deck].clear();
      saveBlacklist();
      renderTopics();
      rebuildOrder(true);
      render();
    }

    function next() {
      if (!state.order.length) return;
      persistEditingIfNeeded();
      state.index = (state.index + 1) % state.order.length;
      state.answerVisible = false;
      render();
    }

    function prev() {
      if (!state.order.length) return;
      persistEditingIfNeeded();
      state.index = (state.index - 1 + state.order.length) % state.order.length;
      state.answerVisible = false;
      render();
    }

    function currentCard() {
      const id = state.order[state.index];
      return activeCardById().get(id);
    }

    function getStatus(id) {
      return state.progress[id]?.status || "";
    }

    function renderStats() {
      const deckCards = visibleCards();
      const pool = state.order.length ? state.order : deckCards.map(card => card.id);
      const statuses = deckCards.map(card => getStatus(card.id));
      els.statDone.textContent = statuses.filter(status => status === "good").length;
      els.statHard.textContent = statuses.filter(status => status === "hard" || status === "bad").length;
      els.statTotal.textContent = pool.length;
    }

    function resetProgress() {
      const ok = window.confirm("Usunąć zapisany postęp i notatki quizu?");
      if (!ok) return;
      state.editing = false;
      state.progress = {};
      state.index = 0;
      state.answerVisible = false;
      saveProgress();
      rebuildOrder();
      render();
    }

    function exportAnki() {
      const rows = [["Front", "Back", "Tags"]];
      activeCards().forEach(card => {
        const tags = [card.topic.replaceAll(" ", "_")];
        if (isMiniCard(card)) tags.push("Pytania_ze_strony_MiNI");
        if (card.sourceQuestion) tags.push("Bank_37_plus");
        rows.push([card.q, card.a, tags.join(" ")]);
      });
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = activeDeck().exportFilename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportState() {
      persistEditingIfNeeded();
      saveProgress();
      saveBlacklist();
      saveSession();
      const payload = {
        version: 1,
        app: "obrona-quiz",
        exportedAt: new Date().toISOString(),
        progress: normalizeProgress(loadStoredJson(STORAGE_KEY, {})),
        blacklist: serializeBlacklist(normalizeBlacklist(loadStoredJson(BLACKLIST_KEY, {}))),
        session: normalizeImportedSession(loadStoredJson(SESSION_KEY, {}))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "obrona_quiz_stan.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importStateFromFile(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || "{}"));
          const progress = normalizeProgress(payload.progress || payload[STORAGE_KEY] || {});
          const blacklist = normalizeBlacklist(payload.blacklist || payload[BLACKLIST_KEY] || {});
          const session = normalizeImportedSession(payload.session || payload[SESSION_KEY] || {});
          const progressCount = Object.keys(progress).length;
          const hiddenMain = blacklist.main.size;
          const hiddenBank = blacklist.bank.size;
          const confirmed = window.confirm(
            `Zaimportować stan quizu?\n\n` +
            `Oceny i edytowane odpowiedzi: ${progressCount}\n` +
            `Blacklisted - Główna: ${hiddenMain}\n` +
            `Blacklisted - Bank 37+: ${hiddenBank}\n\n` +
            `To nadpisze aktualny stan zapisany w tej przeglądarce.`
          );
          if (!confirmed) return;

          localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
          localStorage.setItem(BLACKLIST_KEY, JSON.stringify(serializeBlacklist(blacklist)));
          localStorage.setItem(SESSION_KEY, JSON.stringify(session));
          window.location.reload();
        } catch {
          window.alert("Nie udało się zaimportować stanu. Wybierz plik JSON wyeksportowany z quizu.");
        }
      };
      reader.onerror = () => {
        window.alert("Nie udało się odczytać pliku stanu.");
      };
      reader.readAsText(file, "utf-8");
    }

    function toggleAnswerControls(show) {
      els.showAnswer.style.display = show ? "" : "none";
      els.rateGood.style.display = show ? "" : "none";
      els.rateHard.style.display = show ? "" : "none";
      els.rateBad.style.display = show ? "" : "none";
      els.editAnswer.style.display = show ? "" : "none";
      els.blacklistCurrent.style.display = show ? "" : "none";
      if (!show) els.editTools.hidden = true;
    }

    function updateRatingButtons(status) {
      els.rateGood.classList.toggle("active", status === "good");
      els.rateHard.classList.toggle("active", status === "hard");
      els.rateBad.classList.toggle("active", status === "bad");
    }

    function statusPill(status) {
      if (status === "good") return `<span class="pill good">umiane</span>`;
      if (status === "hard") return `<span class="pill warn">trudne</span>`;
      if (status === "bad") return `<span class="pill bad">nie umiem</span>`;
      return `<span class="pill">nowe</span>`;
    }

    function loadProgress() {
      try {
        const normalized = normalizeProgress(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {});
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
        return normalized;
      } catch {
        return {};
      }
    }

    function normalizeProgress(raw) {
      return Object.entries(raw || {}).reduce((acc, [id, item]) => {
        if (!allCardById.has(id)) return acc;
        const status = typeof item === "string" ? item : item?.status;
        const answerHtml = typeof item?.answerHtml === "string" ? sanitizeRichText(item.answerHtml) : "";
        if (!["good", "hard", "bad"].includes(status) && !answerHtml) return acc;
        acc[id] = {};
        if (["good", "hard", "bad"].includes(status)) {
          acc[id].status = status;
          acc[id].updatedAt = Number(item?.updatedAt) || 0;
        }
        if (answerHtml) {
          acc[id].answerHtml = answerHtml;
          acc[id].editedAt = Number(item?.editedAt) || 0;
        }
        return acc;
      }, {});
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function loadBlacklist() {
      try {
        const normalized = normalizeBlacklist(JSON.parse(localStorage.getItem(BLACKLIST_KEY)) || {});
        localStorage.setItem(BLACKLIST_KEY, JSON.stringify(serializeBlacklist(normalized)));
        return normalized;
      } catch {
        return normalizeBlacklist({});
      }
    }

    function normalizeBlacklist(raw) {
      return VALID_DECKS.reduce((acc, deck) => {
        const known = deckData[deck].cardById;
        const ids = Array.isArray(raw?.[deck]) ? raw[deck] : [];
        acc[deck] = new Set(ids.filter(id => known.has(id)));
        return acc;
      }, {});
    }

    function serializeBlacklist(blacklist) {
      return VALID_DECKS.reduce((acc, deck) => {
        const known = deckData[deck].cardById;
        acc[deck] = [...(blacklist[deck] || [])].filter(id => known.has(id));
        return acc;
      }, {});
    }

    function saveBlacklist() {
      localStorage.setItem(BLACKLIST_KEY, JSON.stringify(serializeBlacklist(state.blacklist)));
    }

    function loadStoredJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function loadSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveSession() {
      const session = {
        deck: state.deck,
        mode: state.mode,
        theme: state.theme,
        index: state.index,
        order: state.order,
        topics: [...state.topics],
        search: els.search?.value || "",
        thesisOnly: Boolean(els.filterThesis?.checked),
        miniOnly: Boolean(els.filterMini?.checked),
        committeeFilters: [...getSelectedCommitteeFilters()],
        statusFilters: [...getSelectedStatusFilters()],
        shuffle: Boolean(els.shuffle?.checked),
        seed: state.seed,
        answerVisible: state.answerVisible,
        savedAt: Date.now()
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    function normalizeImportedSession(raw) {
      const session = raw && typeof raw === "object" ? raw : {};
      const deck = VALID_DECKS.includes(session.deck) ? session.deck : "main";
      const data = deckData[deck] || deckData.main;
      const order = Array.isArray(session.order)
        ? session.order.filter(id => data.cardById.has(id))
        : [];
      const index = Number.isInteger(session.index)
        ? Math.max(0, Math.min(session.index, Math.max(order.length - 1, 0)))
        : 0;
      const validStatuses = new Set(["new", "hard", "bad"]);
      return {
        deck,
        mode: VALID_MODES.includes(session.mode) ? session.mode : "flash",
        theme: VALID_THEMES.includes(session.theme) ? session.theme : "light",
        index,
        order,
        topics: normalizeSavedTopics(session.topics, deck),
        search: typeof session.search === "string" ? session.search : "",
        thesisOnly: deck === "main" && Boolean(session.thesisOnly),
        miniOnly: deck === "main" && Boolean(session.miniOnly),
        committeeFilters: deck === "main" ? normalizeSavedCommitteeFilters(session.committeeFilters) : [],
        statusFilters: Array.isArray(session.statusFilters)
          ? session.statusFilters.filter(status => validStatuses.has(status))
          : [],
        shuffle: typeof session.shuffle === "boolean" ? session.shuffle : true,
        seed: normalizeSeed(session.seed) || generateSeed(),
        answerVisible: Boolean(session.answerVisible),
        savedAt: Date.now()
      };
    }

    function applySessionToControls() {
      els.search.value = typeof savedSession.search === "string" ? savedSession.search : "";
      els.shuffle.checked = typeof savedSession.shuffle === "boolean" ? savedSession.shuffle : true;
      els.filterThesis.checked = Boolean(savedSession.thesisOnly);
      els.filterMini.checked = Boolean(savedSession.miniOnly);
      setCommitteeControls(false);
      normalizeSavedCommitteeFilters(savedSession.committeeFilters).forEach(key => {
        if (els.committeeFilters[key]) els.committeeFilters[key].checked = true;
      });
      syncCommitteeAllFromDetails();
      const filters = new Set(Array.isArray(savedSession.statusFilters) ? savedSession.statusFilters : []);
      els.filterNew.checked = filters.has("new");
      els.filterHard.checked = filters.has("hard");
      els.filterBad.checked = filters.has("bad");
      syncDeckControls();
      syncModeButtons();
      syncThemeButtons();
    }

    function normalizeSavedTopics(topics, deck = "main") {
      const knownTopics = deckData[deck]?.topics || deckData.main.topics;
      if (!Array.isArray(topics)) return knownTopics;
      const known = new Set(knownTopics);
      return topics.filter(topic => known.has(topic));
    }

    function getSeedFromUrl() {
      try {
        return normalizeSeed(new URLSearchParams(window.location.search).get("seed"));
      } catch {
        return "";
      }
    }

    function normalizeSeed(seed) {
      const text = String(seed ?? "").trim();
      return text ? text.replace(/[^\w.-]+/g, "").slice(0, 32) : "";
    }

    function generateSeed() {
      const cryptoObj = window.crypto || window.msCrypto;
      if (cryptoObj?.getRandomValues) {
        const values = new Uint32Array(1);
        cryptoObj.getRandomValues(values);
        return String(values[0]);
      }
      return String((Date.now() + Math.floor(Math.random() * 0xffffffff)) >>> 0);
    }

    function renderSeed() {
      els.seedRow.hidden = !els.shuffle.checked;
      els.seedInput.value = state.seed;
    }

    function applySeedFromInput() {
      setSeed(els.seedInput.value);
    }

    function setSeed(seed) {
      const nextSeed = normalizeSeed(seed) || generateSeed();
      persistEditingIfNeeded();
      state.seed = nextSeed;
      state.index = 0;
      state.answerVisible = false;
      rebuildOrder();
      render();
    }

    function applyTheme() {
      document.body.dataset.theme = state.theme;
    }

    function syncModeButtons() {
      els.modeFlash.classList.toggle("active", state.mode === "flash");
      els.modeOral.classList.toggle("active", state.mode === "oral");
    }

    function syncThemeButtons() {
      els.themeLight.classList.toggle("active", state.theme === "light");
      els.themeDark.classList.toggle("active", state.theme === "dark");
    }

    function getSelectedStatusFilters() {
      const filters = new Set();
      if (els.filterNew?.checked) filters.add("new");
      if (els.filterHard?.checked) filters.add("hard");
      if (els.filterBad?.checked) filters.add("bad");
      return filters;
    }

    function getSelectedCommitteeFilters() {
      const filters = new Set();
      COMMITTEE_FILTER_KEYS.forEach(key => {
        if (els.committeeFilters[key]?.checked) filters.add(key);
      });
      return filters;
    }

    function normalizeSavedCommitteeFilters(filters) {
      if (!Array.isArray(filters)) return [];
      const known = new Set(COMMITTEE_FILTER_KEYS);
      const normalized = filters.filter(key => known.has(key));
      if (normalized.includes("all")) return COMMITTEE_FILTER_KEYS;
      if (COMMITTEE_DETAIL_KEYS.every(key => normalized.includes(key))) return COMMITTEE_FILTER_KEYS;
      return normalized;
    }

    function matchesCommitteeFilter(card, filters) {
      const effectiveFilters = expandCommitteeFilters(filters);
      if (effectiveFilters.has("thesis") && isThesisCard(card)) return true;
      return COMMITTEE_MEMBER_KEYS.some(key => effectiveFilters.has(key) && isCommitteeMemberCard(card, key));
    }

    function expandCommitteeFilters(filters) {
      const effectiveFilters = new Set(filters);
      if (effectiveFilters.has("all")) {
        COMMITTEE_DETAIL_KEYS.forEach(key => effectiveFilters.add(key));
      }
      effectiveFilters.delete("all");
      return effectiveFilters;
    }

    function isCommitteeMemberCard(card, key) {
      const member = COMMITTEE_MEMBER_BY_KEY[key];
      if (!member) return false;
      if (member.topics.includes(card.topic)) return true;
      const text = normalize(card.topic + " " + card.q + " " + getSearchableAnswer(card));
      return member.keywords.some(keyword => text.includes(normalize(keyword)));
    }

    function committeeBadges(card) {
      if (state.deck !== "main") return [];
      const members = COMMITTEE_MEMBERS
        .filter(member => isCommitteeMemberCard(card, member.key))
        .map(member => member.label);
      const badges = [];
      if (members.length) badges.push("Komisja", ...members);
      if (isThesisCard(card)) badges.push("Praca");
      return badges;
    }

    function matchesStatusFilter(id, filters) {
      const status = getStatus(id);
      return (filters.has("new") && !status)
        || (filters.has("hard") && status === "hard")
        || (filters.has("bad") && status === "bad");
    }

    function isThesisCard(card) {
      return Boolean(card.thesis)
        || THESIS_TOPICS.has(card.topic)
        || THESIS_ID_PREFIXES.some(prefix => card.id.startsWith(prefix));
    }

    function isMiniCard(card) {
      return Boolean(card.mini) || card.id.startsWith("mini-");
    }

    function setEditing(active) {
      const card = currentCard();
      if (!card) return;
      state.editing = active;
      state.answerVisible = true;
      render();
      if (active) {
        const answer = document.getElementById("answer");
        if (answer) answer.focus();
      }
    }

    function syncEditControls(card) {
      const hasCard = Boolean(card);
      els.editAnswer.disabled = !hasCard;
      els.blacklistCurrent.disabled = !hasCard;
      els.editAnswer.classList.toggle("active", state.editing);
      els.editAnswer.textContent = state.editing ? "Edycja" : "Edytuj";
      els.editTools.hidden = !state.editing;
      els.clearNote.hidden = !card || !hasCustomAnswer(card.id);
    }

    function formatSelection(kind) {
      const answer = document.getElementById("answer");
      if (!state.editing || !answer) return;
      answer.focus();
      if (kind === "bold") {
        document.execCommand("bold", false);
        return;
      }
      if (kind === "highlight") {
        const ok = document.execCommand("hiliteColor", false, "#fff29a");
        if (!ok) document.execCommand("backColor", false, "#fff29a");
      }
    }

    function saveEditedAnswer(options = {}) {
      const { keepEditing = false, rerender = true } = options;
      const card = currentCard();
      const answer = document.getElementById("answer");
      if (!card || !answer) return;
      const cleaned = sanitizeRichText(answer.innerHTML);
      const base = sanitizeRichText(formatAnswer(card.a));
      const item = { ...(state.progress[card.id] || {}) };
      if (normalizeRichText(cleaned) === normalizeRichText(base)) {
        delete item.answerHtml;
        delete item.editedAt;
      } else {
        item.answerHtml = cleaned;
        item.editedAt = Date.now();
      }
      if (item.status || item.answerHtml) state.progress[card.id] = item;
      else delete state.progress[card.id];
      state.editing = keepEditing;
      state.answerVisible = true;
      saveProgress();
      if (rerender) render();
    }

    function cancelEditing() {
      state.editing = false;
      render();
    }

    function clearEditedAnswer() {
      const card = currentCard();
      if (!card) return;
      const item = { ...(state.progress[card.id] || {}) };
      delete item.answerHtml;
      delete item.editedAt;
      if (item.status) state.progress[card.id] = item;
      else delete state.progress[card.id];
      state.editing = false;
      state.answerVisible = true;
      saveProgress();
      render();
    }

    function persistEditingIfNeeded() {
      if (state.editing) saveEditedAnswer({ keepEditing: false, rerender: false });
    }

    function hasCustomAnswer(id) {
      return Boolean(state.progress[id]?.answerHtml);
    }

    function getAnswerHtml(card) {
      return state.progress[card.id]?.answerHtml || formatAnswer(card.a);
    }

    function getSearchableAnswer(card) {
      const customAnswer = state.progress[card.id]?.answerHtml || "";
      return card.a + " " + plainTextFromHtml(customAnswer);
    }

    function sanitizeRichText(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      const output = document.createElement("div");
      template.content.childNodes.forEach(node => output.appendChild(sanitizeNode(node)));
      return output.innerHTML.replace(/(<br>)+$/g, "");
    }

    function sanitizeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return document.createTextNode(node.textContent || "");
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return document.createDocumentFragment();
      }

      const tag = node.tagName;
      if (tag === "BR") return document.createElement("br");

      const fragment = document.createDocumentFragment();
      node.childNodes.forEach(child => fragment.appendChild(sanitizeNode(child)));

      if (tag === "B" || tag === "STRONG") {
        const strong = document.createElement("strong");
        strong.appendChild(fragment);
        return strong;
      }

      if (tag === "MARK" || hasHighlightStyle(node)) {
        const mark = document.createElement("mark");
        mark.appendChild(fragment);
        return mark;
      }

      if (tag === "DIV" || tag === "P") {
        fragment.appendChild(document.createElement("br"));
      }

      return fragment;
    }

    function hasHighlightStyle(node) {
      const style = node.getAttribute("style") || "";
      return /background(-color)?:/i.test(style);
    }

    function normalizeRichText(html) {
      return html.replace(/\s+/g, " ").replace(/>\s+</g, "><").trim();
    }

    function plainTextFromHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      return template.content.textContent || "";
    }

    function countBy(items, fn) {
      return items.reduce((acc, item) => {
        const key = fn(item);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function shuffle(items, seed) {
      const copy = [...items];
      const random = createSeededRandom(seed);
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createSeededRandom(seed) {
      let value = seedToUint32(seed) || 1;
      return function random() {
        value += 0x6D2B79F5;
        let next = value;
        next = Math.imul(next ^ (next >>> 15), next | 1);
        next ^= next + Math.imul(next ^ (next >>> 7), next | 61);
        return ((next ^ (next >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seedToUint32(seed) {
      let hash = 2166136261;
      for (let i = 0; i < seed.length; i++) {
        hash ^= seed.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function normalize(value) {
      return value.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function slug(value) {
      return normalize(value).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function truncateText(value, maxLength) {
      const text = String(value || "");
      if (text.length <= maxLength) return text;
      return text.slice(0, Math.max(0, maxLength - 1)).trimEnd() + "…";
    }

    function formatAnswer(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }
  </script>
</body>
