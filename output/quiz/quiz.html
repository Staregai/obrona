<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz do obrony MSI</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --text: #18202a;
      --muted: #617080;
      --line: #d8e0e8;
      --accent: #1f7a8c;
      --accent-2: #6d597a;
      --good: #247a4d;
      --bad: #b33b3b;
      --warn: #a56a1d;
      --focus: #f2c14e;
      --shadow: 0 12px 28px rgba(22, 35, 50, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      min-height: 38px;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: #a9bac9;
      background: #fafcfe;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(242, 193, 78, 0.65);
      outline-offset: 2px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      line-height: 1.2;
    }

    .topline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 7px;
      padding: 7px 10px;
      min-width: 94px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 310px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    aside,
    .study {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      align-self: start;
      padding: 16px;
      position: sticky;
      top: 86px;
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .group {
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      min-height: 42px;
      background: var(--surface);
    }

    .segmented button:last-child { border-right: 0; }

    .segmented button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      min-height: 40px;
      padding: 0 10px;
      color: var(--text);
      background: #fff;
    }

    .topics {
      display: grid;
      gap: 7px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
    }

    .topic-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .topic-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .switches {
      display: grid;
      gap: 8px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 32px;
    }

    .switch input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent-2);
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .study {
      min-height: calc(100vh - 116px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress-wrap {
      min-width: min(360px, 100%);
      flex: 1;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: #e8edf2;
      border: 1px solid var(--line);
    }

    .progress div {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--focus));
      width: 0%;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-area {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.good { color: var(--good); background: #edf7f1; border-color: #c6e4d2; }
    .pill.bad { color: var(--bad); background: #fff0f0; border-color: #f1c9c9; }
    .pill.warn { color: var(--warn); background: #fff6e8; border-color: #efd4aa; }

    .question {
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.18;
      font-weight: 800;
      max-width: 1050px;
      margin: 0;
    }

    .answer {
      display: none;
      border-left: 4px solid var(--accent);
      background: #f7fbfc;
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      max-width: 1050px;
      font-size: 17px;
      line-height: 1.55;
    }

    .answer.visible {
      display: block;
    }

    .choices {
      display: grid;
      gap: 10px;
      max-width: 980px;
    }

    .choice {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      min-height: 54px;
      padding: 8px 12px;
    }

    .choice .key {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-weight: 800;
      background: var(--surface-2);
      color: var(--muted);
    }

    .choice.correct {
      border-color: #a6d8b9;
      background: #eef9f2;
    }

    .choice.correct .key {
      background: var(--good);
      color: #fff;
    }

    .choice.wrong {
      border-color: #eab2b2;
      background: #fff2f2;
    }

    .choice.wrong .key {
      background: var(--bad);
      color: #fff;
    }

    .feedback {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--muted);
      background: #fbfcfe;
      display: none;
      max-width: 980px;
      line-height: 1.45;
    }

    .feedback.visible { display: block; }
    .feedback.good { color: var(--good); border-color: #bee4cc; background: #f0faf4; }
    .feedback.bad { color: var(--bad); border-color: #edc0c0; background: #fff4f4; }

    .bottom {
      border-top: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rating {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 800;
    }

    .primary:hover {
      background: #176a7a;
      border-color: #176a7a;
    }

    .good-btn {
      border-color: #afd8bf;
      color: var(--good);
      background: #f1faf5;
    }

    .warn-btn {
      border-color: #e4c189;
      color: var(--warn);
      background: #fff7ea;
    }

    .bad-btn {
      border-color: #e6b3b3;
      color: var(--bad);
      background: #fff2f2;
    }

    .rating button.active {
      box-shadow: inset 0 0 0 2px currentColor;
      font-weight: 800;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 30px;
      color: var(--muted);
      border-radius: 8px;
      background: #fbfcfe;
      max-width: 720px;
    }

    @media (max-width: 880px) {
      header {
        grid-template-columns: 1fr;
      }

      .topline {
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      aside {
        position: static;
        max-height: none;
      }

      .study {
        min-height: 680px;
      }

      .question {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Quiz do obrony MSI</h1>
      <div class="topline" aria-live="polite">
        <div class="stat"><strong id="statDone">0</strong><span>umiane</span></div>
        <div class="stat"><strong id="statHard">0</strong><span>trudne</span></div>
        <div class="stat"><strong id="statTotal">0</strong><span>w puli</span></div>
      </div>
    </header>

    <main>
      <aside>
        <div class="group">
          <div class="label">Tryb</div>
          <div class="segmented" role="tablist" aria-label="Tryb nauki">
            <button id="modeFlash" class="active" type="button">Fiszki</button>
            <button id="modeTest" type="button">Test</button>
            <button id="modeOral" type="button">Ustny</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Szukaj</div>
          <input id="search" class="search" type="search" placeholder="np. Bellman, TSP, Hopfield">
        </div>

        <div class="group">
          <div class="label">Działy</div>
          <div id="topics" class="topics"></div>
        </div>

        <div class="group">
          <div class="label">Sesja</div>
          <div class="switches">
            <label class="switch"><input id="onlyHard" type="checkbox"> Tylko trudne</label>
            <label class="switch"><input id="shuffle" type="checkbox" checked> Losowa kolejność</label>
          </div>
        </div>

        <div class="group">
          <div class="label">Dane</div>
          <div class="side-actions">
            <button id="exportAnki" type="button">Anki CSV</button>
            <button id="reset" type="button">Reset</button>
          </div>
        </div>
      </aside>

      <section class="study" aria-live="polite">
        <div class="toolbar">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="counter">0 / 0</span>
              <span id="topicName">-</span>
            </div>
            <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
          </div>
          <div class="toolbar-actions">
            <button id="prev" type="button">Poprzednie</button>
            <button id="nextTop" type="button">Następne</button>
          </div>
        </div>

        <div class="card-area" id="cardArea"></div>

        <div class="bottom">
          <div class="rating">
            <button id="showAnswer" class="primary" type="button">Pokaż odpowiedź</button>
            <button id="rateGood" class="good-btn" type="button">Umiem</button>
            <button id="rateHard" class="warn-btn" type="button">Trudne</button>
            <button id="rateBad" class="bad-btn" type="button">Nie umiem</button>
          </div>
          <button id="next" class="primary" type="button">Następne</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const cards = [
      {
        id: "chomsky-1",
        topic: "Teoria i złożoność",
        q: "Jaka jest kolejność klas w hierarchii Chomsky'ego od najprostszej do najszerszej?",
        a: "Typ 3: języki regularne i automaty skończone. Typ 2: języki bezkontekstowe i automaty ze stosem. Typ 1: języki kontekstowe i liniowo ograniczone maszyny Turinga. Typ 0: gramatyki bez ograniczeń i maszyny Turinga.",
        choices: ["regularne, bezkontekstowe, kontekstowe, typu 0", "typu 0, regularne, kontekstowe, bezkontekstowe", "bezkontekstowe, regularne, typu 0, kontekstowe", "regularne, kontekstowe, bezkontekstowe, typu 0"],
        correct: 0
      },
      {
        id: "chomsky-2",
        topic: "Teoria i złożoność",
        q: "Jaki automat odpowiada językom bezkontekstowym?",
        a: "Językom bezkontekstowym odpowiada automat ze stosem. Stos daje pamięć LIFO, dzięki której można rozpoznawać struktury zagnieżdżone, np. poprawne nawiasowania albo język a^n b^n.",
        choices: ["automat ze stosem", "automat skończony", "liniowo ograniczona maszyna Turinga", "automat bez pamięci"],
        correct: 0
      },
      {
        id: "complexity-1",
        topic: "Teoria i złożoność",
        q: "Co oznacza zapis T(n) = O(g(n))?",
        a: "Oznacza asymptotyczne ograniczenie z góry: istnieją stałe c > 0 i n0, takie że dla każdego n >= n0 zachodzi T(n) <= c g(n). Pomijamy stałe i niższe rzędy, bo interesuje nas tempo wzrostu.",
        choices: ["ograniczenie z góry z dokładnością do stałej", "dokładną liczbę operacji dla każdego n", "ograniczenie z dołu", "średni błąd algorytmu"],
        correct: 0
      },
      {
        id: "pnp-1",
        topic: "Teoria i złożoność",
        q: "Jaka jest różnica między klasami P i NP?",
        a: "P zawiera problemy decyzyjne rozwiązywalne deterministycznie w czasie wielomianowym. NP zawiera problemy, dla których certyfikat odpowiedzi TAK można zweryfikować w czasie wielomianowym.",
        choices: ["P to szybkie rozwiązywanie, NP to szybka weryfikacja certyfikatu", "P to problemy pamięciowe, NP to problemy numeryczne", "P to problemy losowe, NP to deterministyczne", "P i NP są z definicji rozłączne"],
        correct: 0
      },
      {
        id: "pnp-2",
        topic: "Teoria i złożoność",
        q: "Co znaczy, że problem jest NP-zupełny?",
        a: "Problem jest w NP i jest NP-trudny, czyli każdy problem z NP redukuje się do niego w czasie wielomianowym. Gdyby jeden problem NP-zupełny miał algorytm wielomianowy, to P = NP.",
        choices: ["należy do NP i każdy problem z NP redukuje się do niego", "nie da się go rozwiązać żadnym algorytmem", "jest trudniejszy niż wszystkie problemy nierozstrzygalne", "ma zawsze tylko jedną poprawną odpowiedź"],
        correct: 0
      },
      {
        id: "testing-random-1",
        topic: "Teoria i złożoność",
        q: "Dlaczego w testowaniu algorytmów losowych trzeba zapisywać ziarna generatorów?",
        a: "Bez ziaren trudno odtworzyć przebieg, odróżnić błąd od naturalnej losowości i porównać poprawki kodu. Reprodukowalność jest pierwszym warunkiem sensownego debugowania metod losowych.",
        choices: ["żeby dało się odtworzyć dokładny przebieg", "żeby algorytm przestał być losowy matematycznie", "żeby obniżyć złożoność pamięciową", "żeby ominąć walidację statystyczną"],
        correct: 0
      },
      {
        id: "experiment-1",
        topic: "Teoria i złożoność",
        q: "Co jest typowym błędem w eksperymentach obliczeniowych z ML?",
        a: "Częsty błąd to przeciek danych: selekcja cech, skalowanie, imputacja albo dobór parametrów wykonane z użyciem zbioru testowego. Wynik testowy staje się wtedy zawyżony.",
        choices: ["użycie informacji ze zbioru testowego podczas strojenia", "podanie średniej i odchylenia standardowego", "porównanie z baseline'em", "zapisanie wersji kodu"],
        correct: 0
      },
      {
        id: "tsp-1",
        topic: "Algorytmy i numeryczne",
        q: "Na czym polega problem komiwojażera?",
        a: "Trzeba znaleźć najkrótszy cykl odwiedzający każde miasto dokładnie raz i wracający do punktu startowego. Wersja optymalizacyjna jest NP-trudna, a decyzyjna jest NP-zupełna.",
        choices: ["na znalezieniu najkrótszego cyklu przez wszystkie miasta", "na znalezieniu dowolnej ścieżki między dwoma miastami", "na minimalnym drzewie rozpinającym", "na kolorowaniu grafu"],
        correct: 0
      },
      {
        id: "tsp-2",
        topic: "Algorytmy i numeryczne",
        q: "Jaką gwarancję daje algorytm Christofidesa dla symetrycznego metrycznego TSP?",
        a: "Daje rozwiązanie o koszcie co najwyżej 3/2 optimum. Wykorzystuje MST, minimalne skojarzenie doskonałe na wierzchołkach nieparzystych, cykl Eulera i skracanie powtórzeń.",
        choices: ["3/2 optimum", "dokładne optimum w czasie O(n^2)", "2^n optimum", "brak jakiejkolwiek gwarancji"],
        correct: 0
      },
      {
        id: "interpolation-1",
        topic: "Algorytmy i numeryczne",
        q: "Czym interpolacja różni się od aproksymacji?",
        a: "Interpolacja wymaga dokładnego przejścia przez zadane punkty. Aproksymacja dopuszcza błąd w punktach i szuka funkcji najlepiej pasującej według wybranego kryterium.",
        choices: ["interpolacja przechodzi przez punkty, aproksymacja nie musi", "aproksymacja zawsze używa wielomianów, interpolacja nigdy", "interpolacja działa tylko dla danych zaszumionych", "nie ma różnicy"],

      },
      {
        id: "interpolation-2",
        topic: "Algorytmy i numeryczne",
        q: "Co to jest efekt Rungego?",
        a: "To silne oscylacje wielomianu interpolacyjnego wysokiego stopnia, zwykle przy końcach przedziału dla równoodległych węzłów. Przeciwdziała się mu przez splajny albo węzły Czebyszewa.",
        choices: ["oscylacje interpolacji wielomianowej wysokiego stopnia", "błąd zaokrąglenia w eliminacji Gaussa", "zbieżność kwadratowa Newtona", "utrata danych po normalizacji"],
        correct: 0
      },
      {
        id: "linear-1",
        topic: "Algorytmy i numeryczne",
        q: "Po co stosuje się pivoting w eliminacji Gaussa?",
        a: "Pivoting wybiera stabilniejszy element główny, unika dzielenia przez zero albo bardzo małą liczbę i ogranicza narastanie błędów numerycznych.",
        choices: ["dla stabilności i uniknięcia złego pivota", "żeby zmienić układ na nieliniowy", "żeby zawsze uzyskać macierz diagonalną", "żeby zmniejszyć liczbę niewiadomych"],
        correct: 0
      },
      {
        id: "linear-2",
        topic: "Algorytmy i numeryczne",
        q: "Kiedy szczególnie opłaca się rozkład LU?",
        a: "Gdy rozwiązujemy wiele układów z tą samą macierzą A i różnymi prawymi stronami b. Rozkład liczymy raz, a potem wykonujemy szybkie podstawiania.",
        choices: ["przy wielu prawych stronach dla tej samej macierzy", "tylko dla macierzy diagonalnych", "wyłącznie przy układach nieliniowych", "gdy nie wolno używać pamięci"],
        correct: 0
      },
      {
        id: "roots-1",
        topic: "Algorytmy i numeryczne",
        q: "Jaka jest aktualizacja w metodzie Newtona dla zera funkcji jednej zmiennej?",
        a: "x_{k+1} = x_k - f(x_k) / f'(x_k). Metoda jest szybka lokalnie, ale wymaga pochodnej i dobrego punktu startowego.",
        choices: ["x_{k+1} = x_k - f(x_k) / f'(x_k)", "x_{k+1} = (a+b)/2 zawsze", "x_{k+1} = f'(x_k)", "x_{k+1} = x_k + f(x_k)f'(x_k)"],
        correct: 0
      },
      {
        id: "roots-2",
        topic: "Algorytmy i numeryczne",

      ["wae-13", "Algorytmy ewolucyjne", "Co oznacza interpretacja algorytmu ewolucyjnego jako adaptacji rozkładu populacji?", "Populację można traktować jako próbkę z pewnego rozkładu w przestrzeni rozwiązań. Selekcja przesuwa masę rozkładu w stronę lepszych obszarów, mutacja rozprasza ją, a krzyżowanie miesza zależności między współrzędnymi. W modelu populacji nieskończonej analizuje się bezpośrednio zmianę rozkładu, a nie losową próbkę.", "populacja jest próbką rozkładu, który selekcja i mutacja adaptują", "każdy osobnik jest osobnym deterministycznym algorytmem sortowania", "rozkład dotyczy wyłącznie błędów OCR", "adaptacja rozkładu oznacza brak funkcji celu"],
      ["wae-14", "Algorytmy ewolucyjne", "Jak zasięg mutacji wpływa na eksplorację i eksploatację?", "Mały zasięg mutacji daje lokalne dopracowywanie rozwiązań, ale może nie przeskoczyć barier funkcji celu. Duży zasięg zwiększa eksplorację, ale może niszczyć dobre rozwiązania i utrudniać zbieżność. Dlatego często adaptuje się wariancję mutacji w trakcie działania.", "mały zasięg eksploatuje lokalnie, duży eksploruje szerzej", "zasięg mutacji nie ma wpływu na dynamikę populacji", "duży zasięg zawsze gwarantuje optimum", "mały zasięg oznacza brak losowości"],
      ["wae-15", "Algorytmy ewolucyjne", "Na czym polega adaptacja parametrów mutacji?", "Algorytm może zmieniać prawdopodobieństwo, typ lub zasięg mutacji na podstawie skuteczności poprzednich mutacji. Jeżeli wiele mutacji daje poprawę, można zwiększyć krok; jeżeli poprawy są rzadkie, można zmniejszyć krok albo zmienić wariant operatora. Chodzi o automatyczne balansowanie eksploracji i eksploatacji.", "na zmianie typu lub zasięgu mutacji według skuteczności poprzednich mutacji", "na stałym ustawieniu mutacji na zero", "na zastąpieniu selekcji algorytmem Huffmana", "na liczeniu dokładności klasyfikatora bez populacji"],

      ["az-1", "Algorytmy zaawansowane", "Czym różnią się notacje O, Omega i Theta?", "O(f(n)) daje górne ograniczenie asymptotyczne z dokładnością do stałej, Omega(f(n)) daje dolne ograniczenie, a Theta(f(n)) oznacza ograniczenie z obu stron. Formalnie od pewnego n0 pomija się małe instancje i stałe mnożniki, bo interesuje nas tempo wzrostu dla dużych danych.", "O to góra, Omega dół, Theta oba ograniczenia asymptotyczne", "O oznacza dokładny czas dla każdego n", "Omega oznacza średnią po losowych danych", "Theta zawsze oznacza złożoność wykładniczą"],
      ["az-2", "Algorytmy zaawansowane", "Jakie są trzy przypadki Master Theorem dla T(n)=aT(n/b)+f(n)?", "Porównuje się f(n) z n^(log_b a). Jeśli f jest asymptotycznie mniejsza wielomianowo, dominuje koszt liści i T(n)=Theta(n^(log_b a)). Jeśli jest tego samego rzędu, dochodzi czynnik log n. Jeśli f jest większa wielomianowo i spełnia warunek regularności, dominuje koszt na korzeniu i T(n)=Theta(f(n)).", "porównuje się f(n) z n^(log_b a): liście, remis z log n albo korzeń", "zawsze wychodzi Theta(n log n)", "twierdzenie działa tylko dla algorytmów zachłannych", "porównuje się f(n) z liczbą krawędzi grafu"],

      ["az-5", "Algorytmy zaawansowane", "Dlaczego w problemie wyboru zajęć działa strategia najwcześniejszego końca?", "Wybór zajęcia kończącego się najwcześniej zostawia maksymalnie dużo miejsca na pozostałe zajęcia. Dowód zwykle używa argumentu wymiany: w pewnym optymalnym rozwiązaniu można zastąpić pierwsze wybrane zajęcie tym najwcześniej kończącym się bez zmniejszenia liczby zajęć.", "bo najwcześniejszy koniec zostawia najwięcej miejsca, a dowód robi się wymianą", "bo wybiera najdłuższe zajęcie", "bo problem wymaga programowania dynamicznego dla każdej instancji", "bo każde losowe zajęcie daje optimum"],
      ["az-6", "Algorytmy zaawansowane", "Co minimalizuje algorytm Huffmana?", "Huffman buduje optymalny kod prefiksowy minimalizujący łączną liczbę bitów B(T)=sum_c f(c)d_T(c), gdzie f(c) to częstość znaku, a d_T(c) długość jego słowa kodowego. Zachłannie łączy dwa najmniej częste symbole, bo w pewnym optymalnym drzewie mogą być najgłębszym rodzeństwem.", "koszt kodu prefiksowego sum_c f(c)d_T(c)", "liczbę składowych spójnych grafu", "maksymalny przepływ w sieci", "liczbę epok w uczeniu sieci"],

      ["az-11", "Algorytmy zaawansowane", "Jak działa dokładny algorytm dla Subset Sum oparty na listach?", "Dla kolejnych elementów tworzy listę możliwych sum: L_i = merge(L_{i-1}, L_{i-1}+x_i), usuwa duplikaty i odrzuca sumy większe od t. Wynik to największa suma <= t. Algorytm jest dokładny, ale lista może mieć długość wykładniczą, więc w najgorszym przypadku czas jest wykładniczy.", "utrzymuje listy osiągalnych sum i scala je po dodaniu kolejnego elementu", "rozwiązuje problem przez jedno sortowanie O(n log n)", "używa BFS w grafie dwudzielnym", "zawsze działa w czasie liniowym"],

      ["az-13", "Algorytmy zaawansowane", "Na czym polega przycinanie list w FPTAS dla Subset Sum?", "Procedura Trim usuwa z posortowanej listy wartości bardzo bliskie względnie: jeśli kolejna suma jest nie większa niż poprzednia zachowana pomnożona przez 1+delta, można ją pominąć. Dzięki temu lista pozostaje wielomianowo krótka, a błąd wartości jest kontrolowany parametrem epsilon.", "usuwa względnie bliskie sumy, utrzymując kontrolowany błąd aproksymacji", "usuwa zawsze największą sumę", "zamienia problem na kod Huffmana", "gwarantuje dokładne optimum bez względu na epsilon"],
      ["az-14", "Algorytmy zaawansowane", "Czym PTAS różni się od FPTAS?", "PTAS dla każdego epsilon > 0 daje rozwiązanie (1+epsilon)-aproksymacyjne w czasie wielomianowym względem rozmiaru instancji przy stałym epsilon. FPTAS wymaga dodatkowo wielomianowości względem 1/epsilon, więc kontrola dokładności nie może powodować np. wykładniczego kosztu w 1/epsilon.", "FPTAS jest wielomianowy także względem 1/epsilon", "PTAS zawsze działa szybciej niż FPTAS", "FPTAS daje tylko stałą aproksymację 2", "PTAS dotyczy wyłącznie grafów dwudzielnych"],

      },
      "bober-eval-5": {
        a: "Niepewność warto przekazywać jako confidence, alternatywne hipotezy, źródło predykcji, ostrzeżenia i informacje o naprawach w reprezentacji pośredniej. Następny moduł może wtedy unikać twardych decyzji, wybrać hipotezę zgodną z kontekstem albo oznaczyć fragment do ręcznej korekty. Bez propagacji niepewności pipeline ukrywa słabe miejsca i utrudnia diagnozę błędów."
      },
      "bober-eval-6": {
        a: "Kalibracja oznacza zgodność confidence z rzeczywistą częstością poprawności. Jeśli model daje wielu predykcjom pewność 0,8, około 80% z nich powinno być poprawnych. Dobrze skalibrowane confidence jest ważne w pipeline'ie, bo pozwala podejmować decyzje o progach, fallbackach i ręcznej korekcie; wysoki accuracy nie gwarantuje dobrej kalibracji."
      }
    };

    Object.entries(cardPatches).forEach(([id, patch]) => {
      const card = cards.find(item => item.id === id);
      if (card) Object.assign(card, patch);
    });

    cards.forEach(card => {
      if (card.topic === "Praca: wyniki i ograniczenia") {
        card.topic = "OMR/SVS: wyniki i metodologia";
      }
    });

    const STORAGE_KEY = "obronaQuizProgress.v1";
    const state = {
      mode: "flash",
      index: 0,
      order: [],
      topics: new Set(cards.map(card => card.topic)),
      progress: loadProgress()
    };

    const els = {
      topics: document.getElementById("topics"),
      search: document.getElementById("search"),
      onlyHard: document.getElementById("onlyHard"),
      shuffle: document.getElementById("shuffle"),
      cardArea: document.getElementById("cardArea"),
      counter: document.getElementById("counter"),
      topicName: document.getElementById("topicName"),
      progressBar: document.getElementById("progressBar"),
      statDone: document.getElementById("statDone"),
      statHard: document.getElementById("statHard"),
      statTotal: document.getElementById("statTotal"),
      showAnswer: document.getElementById("showAnswer"),
      rateGood: document.getElementById("rateGood"),
      rateHard: document.getElementById("rateHard"),
      rateBad: document.getElementById("rateBad"),
      next: document.getElementById("next"),
      nextTop: document.getElementById("nextTop"),
      prev: document.getElementById("prev"),
      reset: document.getElementById("reset"),
      exportAnki: document.getElementById("exportAnki"),
      modeFlash: document.getElementById("modeFlash"),
      modeTest: document.getElementById("modeTest"),
      modeOral: document.getElementById("modeOral")
    };

    init();

    function init() {
      renderTopics();
      bind();
      rebuildOrder();
      render();
    }

    function bind() {
      els.search.addEventListener("input", () => {
        state.index = 0;
        rebuildOrder();
        render();
      });
      els.onlyHard.addEventListener("change", () => {
        state.index = 0;
        rebuildOrder();
        render();
      });
      els.shuffle.addEventListener("change", () => {
        state.index = 0;
        rebuildOrder();
        render();
      });
      els.showAnswer.addEventListener("click", showAnswer);
      els.rateGood.addEventListener("click", () => rate("good"));
      els.rateHard.addEventListener("click", () => rate("hard"));
      els.rateBad.addEventListener("click", () => rate("bad"));
      els.next.addEventListener("click", next);
      els.nextTop.addEventListener("click", next);
      els.prev.addEventListener("click", prev);
      els.reset.addEventListener("click", resetProgress);
      els.exportAnki.addEventListener("click", exportAnki);
      els.modeFlash.addEventListener("click", () => setMode("flash"));
      els.modeTest.addEventListener("click", () => setMode("test"));
      els.modeOral.addEventListener("click", () => setMode("oral"));
    }

    function renderTopics() {
      const counts = countBy(cards, card => card.topic);
      els.topics.innerHTML = "";
      Object.keys(counts).sort().forEach(topic => {
        const id = "topic-" + slug(topic);
        const row = document.createElement("label");
        row.className = "topic-row";
        row.innerHTML = `
          <input type="checkbox" id="${id}" checked>
          <strong>${escapeHtml(topic)}</strong>
          <span>${counts[topic]}</span>
        `;
        row.querySelector("input").addEventListener("change", event => {
          if (event.target.checked) state.topics.add(topic);
          else state.topics.delete(topic);
          state.index = 0;
          rebuildOrder();
          render();
        });
        els.topics.appendChild(row);
      });
    }

    function setMode(mode) {
      state.mode = mode;
      els.modeFlash.classList.toggle("active", mode === "flash");
      els.modeTest.classList.toggle("active", mode === "test");
      els.modeOral.classList.toggle("active", mode === "oral");
      render();
    }

    function rebuildOrder() {
      const query = normalize(els.search.value);
      let pool = cards.filter(card => {
        if (!state.topics.has(card.topic)) return false;
        if (els.onlyHard.checked && getStatus(card.id) !== "hard" && getStatus(card.id) !== "bad") return false;
        if (!query) return true;
        return normalize(card.q + " " + card.a + " " + card.topic).includes(query);
      });
      if (els.shuffle.checked) pool = shuffle(pool);
      state.order = pool.map(card => card.id);
      if (state.index >= state.order.length) state.index = Math.max(0, state.order.length - 1);
    }

    function render() {
      renderStats();
      const card = currentCard();
      if (!card) {
        els.cardArea.innerHTML = `<div class="empty">Brak pytań dla wybranych filtrów.</div>`;
        els.counter.textContent = "0 / 0";
        els.topicName.textContent = "-";
        els.progressBar.style.width = "0%";
        toggleAnswerControls(false);
        return;
      }

      const current = state.index + 1;
      const total = state.order.length;
      els.counter.textContent = `${current} / ${total}`;
      els.topicName.textContent = card.topic;
      els.progressBar.style.width = `${Math.round((current / total) * 100)}%`;
      toggleAnswerControls(state.mode !== "test");
      updateRatingButtons(getStatus(card.id));

      if (state.mode === "test") renderTest(card);
      else renderFlash(card, state.mode === "oral");
    }

    function renderFlash(card, oral) {
      const status = getStatus(card.id);
      els.cardArea.innerHTML = `
        <div class="meta-row">
          <span class="pill">${escapeHtml(card.topic)}</span>
          ${statusPill(status)}
        </div>
        <h2 class="question">${escapeHtml(card.q)}</h2>
        <div id="answer" class="answer">${formatAnswer(card.a)}</div>
      `;
      els.showAnswer.textContent = oral ? "Pokaż konspekt" : "Pokaż odpowiedź";
    }

    function renderTest(card) {
      const status = getStatus(card.id);
      const options = card.choices.map((choice, index) => ({ choice, index }));
      els.cardArea.innerHTML = `
        <div class="meta-row">
          <span class="pill">${escapeHtml(card.topic)}</span>
          ${statusPill(status)}
        </div>
        <h2 class="question">${escapeHtml(card.q)}</h2>
        <div class="choices">
          ${options.map((item, i) => `
            <button class="choice" type="button" data-index="${item.index}">
              <span class="key">${String.fromCharCode(65 + i)}</span>
              <span>${escapeHtml(item.choice)}</span>
            </button>
          `).join("")}
        </div>
        <div id="feedback" class="feedback"></div>
      `;
      document.querySelectorAll(".choice").forEach(button => {
        button.addEventListener("click", () => answerChoice(Number(button.dataset.index)));
      });
    }

    function answerChoice(choiceIndex) {
      const card = currentCard();
      const feedback = document.getElementById("feedback");
      const correct = choiceIndex === card.correct;
      document.querySelectorAll(".choice").forEach(button => {
        const idx = Number(button.dataset.index);
        button.disabled = true;
        if (idx === card.correct) button.classList.add("correct");
        if (idx === choiceIndex && !correct) button.classList.add("wrong");
      });
      feedback.className = "feedback visible " + (correct ? "good" : "bad");
      feedback.innerHTML = `<strong>${correct ? "Dobrze." : "Nie."}</strong> ${formatAnswer(card.a)}`;
      mark(card.id, correct ? "good" : "bad");
      renderStats();
    }

    function showAnswer() {
      const answer = document.getElementById("answer");
      if (answer) answer.classList.add("visible");
    }

    function rate(value) {
      const card = currentCard();
      if (!card) return;
      mark(card.id, value);
      renderStats();
      next();
    }

    function mark(id, value) {
      if (!["good", "hard", "bad"].includes(value)) return;
      state.progress[id] = {
        status: value,
        updatedAt: Date.now()
      };
      saveProgress();
      updateRatingButtons(value);
    }

    function next() {
      if (!state.order.length) return;
      state.index = (state.index + 1) % state.order.length;
      render();
    }

    function prev() {
      if (!state.order.length) return;
      state.index = (state.index - 1 + state.order.length) % state.order.length;
      render();
    }

    function currentCard() {
      const id = state.order[state.index];
      return cards.find(card => card.id === id);
    }

    function getStatus(id) {
      return state.progress[id]?.status || "";
    }

    function renderStats() {
      const pool = state.order.length ? state.order : cards.map(card => card.id);
      const statuses = cards.map(card => getStatus(card.id));
      els.statDone.textContent = statuses.filter(status => status === "good").length;
      els.statHard.textContent = statuses.filter(status => status === "hard" || status === "bad").length;
      els.statTotal.textContent = pool.length;
    }

    function resetProgress() {
      const ok = window.confirm("Usunąć zapisany postęp quizu?");
      if (!ok) return;
      state.progress = {};
      saveProgress();
      rebuildOrder();
      render();
    }

    function exportAnki() {
      const rows = [["Front", "Back", "Tags"]];
      cards.forEach(card => {
        rows.push([card.q, card.a, card.topic.replaceAll(" ", "_")]);
      });
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "obrona_anki.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function toggleAnswerControls(show) {
      els.showAnswer.style.display = show ? "" : "none";
      els.rateGood.style.display = show ? "" : "none";
      els.rateHard.style.display = show ? "" : "none";
      els.rateBad.style.display = show ? "" : "none";
    }

    function updateRatingButtons(status) {
      els.rateGood.classList.toggle("active", status === "good");
      els.rateHard.classList.toggle("active", status === "hard");
      els.rateBad.classList.toggle("active", status === "bad");
    }

    function statusPill(status) {
      if (status === "good") return `<span class="pill good">umiane</span>`;
      if (status === "hard") return `<span class="pill warn">trudne</span>`;
      if (status === "bad") return `<span class="pill bad">do powtórki</span>`;
      return `<span class="pill">nowe</span>`;
    }

    function loadProgress() {
      try {
        const normalized = normalizeProgress(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {});
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
        return normalized;
      } catch {
        return {};
      }
    }

    function normalizeProgress(raw) {
      return Object.entries(raw || {}).reduce((acc, [id, item]) => {
        const status = typeof item === "string" ? item : item?.status;
        if (["good", "hard", "bad"].includes(status)) {
          acc[id] = {
            status,
            updatedAt: Number(item?.updatedAt) || 0
          };
        }
        return acc;
      }, {});
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function countBy(items, fn) {
      return items.reduce((acc, item) => {
        const key = fn(item);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(value) {
      return value.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function slug(value) {
      return normalize(value).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatAnswer(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }
  </script>
</body>
</html>
