<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz do obrony MSI</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --text: #18202a;
      --muted: #617080;
      --line: #d8e0e8;
      --accent: #1f7a8c;
      --accent-2: #6d597a;
      --good: #247a4d;
      --bad: #b33b3b;
      --warn: #a56a1d;
      --focus: #f2c14e;
      --shadow: 0 12px 28px rgba(22, 35, 50, 0.10);
      --button-hover-bg: #fafcfe;
      --button-hover-border: #a9bac9;
      --input-bg: #ffffff;
      --progress-bg: #e8edf2;
      --answer-bg: #f7fbfc;
      --empty-bg: #fbfcfe;
      --good-bg: #edf7f1;
      --good-line: #c6e4d2;
      --bad-bg: #fff0f0;
      --bad-line: #f1c9c9;
      --warn-bg: #fff6e8;
      --warn-line: #efd4aa;
      --highlight: #fff29a;
      --highlight-text: #1f1a00;
      --edit-bg: #fffdf4;
    }

    * { box-sizing: border-box; }

    body[data-theme="dark"] {
      --bg: #11151b;
      --surface: #18212b;
      --surface-2: #222e3a;
      --text: #edf2f7;
      --muted: #a9b6c3;
      --line: #344353;
      --accent: #4aa3b5;
      --accent-2: #c49bd0;
      --good: #82d99b;
      --bad: #ff8c8c;
      --warn: #f0bd62;
      --focus: #f2c14e;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
      --button-hover-bg: #22303d;
      --button-hover-border: #536577;
      --input-bg: #121922;
      --progress-bg: #101820;
      --answer-bg: #14262d;
      --empty-bg: #141b23;
      --good-bg: #173525;
      --good-line: #2e6743;
      --bad-bg: #3b1d24;
      --bad-line: #7a3a45;
      --warn-bg: #362917;
      --warn-line: #74542a;
      --highlight: #ffdf6e;
      --highlight-text: #1d1700;
      --edit-bg: #211f18;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      min-height: 38px;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(242, 193, 78, 0.65);
      outline-offset: 2px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      line-height: 1.2;
    }

    .topline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 7px;
      padding: 7px 10px;
      min-width: 94px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 310px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    aside,
    .study {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      align-self: start;
      padding: 16px;
      position: sticky;
      top: 86px;
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .group {
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      min-height: 42px;
      background: var(--surface);
    }

    .segmented button:last-child { border-right: 0; }

    .segmented button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      min-height: 40px;
      padding: 0 10px;
      color: var(--text);
      background: var(--input-bg);
    }

    .topics {
      display: grid;
      gap: 7px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
    }

    .topic-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .topic-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .switches {
      display: grid;
      gap: 8px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 32px;
    }

    .switch input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent-2);
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .study {
      min-height: calc(100vh - 116px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress-wrap {
      min-width: min(360px, 100%);
      flex: 1;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--progress-bg);
      border: 1px solid var(--line);
    }

    .progress div {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--focus));
      width: 0%;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-area {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.good { color: var(--good); background: var(--good-bg); border-color: var(--good-line); }
    .pill.bad { color: var(--bad); background: var(--bad-bg); border-color: var(--bad-line); }
    .pill.warn { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-line); }
    .pill.note { color: var(--accent-2); }

    .question {
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.18;
      font-weight: 800;
      max-width: 1050px;
      margin: 0;
    }

    .answer {
      display: none;
      border-left: 4px solid var(--accent);
      background: var(--answer-bg);
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      max-width: 1050px;
      font-size: 17px;
      line-height: 1.55;
    }

    .answer.visible {
      display: block;
    }

    .answer[contenteditable="true"] {
      display: block;
      background: var(--edit-bg);
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      min-height: 150px;
    }

    .answer mark {
      background: var(--highlight);
      color: var(--highlight-text);
      padding: 0 2px;
      border-radius: 3px;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rating {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .edit-tools[hidden] {
      display: none;
    }

    .format-btn {
      min-width: 42px;
      padding: 0 10px;
      font-weight: 800;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 800;
    }

    .primary:hover {
      background: #176a7a;
      border-color: #176a7a;
    }

    .good-btn {
      border-color: var(--good-line);
      color: var(--good);
      background: var(--good-bg);
    }

    .warn-btn {
      border-color: var(--warn-line);
      color: var(--warn);
      background: var(--warn-bg);
    }

    .bad-btn {
      border-color: var(--bad-line);
      color: var(--bad);
      background: var(--bad-bg);
    }

    .rating button.active {
      box-shadow: inset 0 0 0 2px currentColor;
      font-weight: 800;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 30px;
      color: var(--muted);
      border-radius: 8px;
      background: var(--empty-bg);
      max-width: 720px;
    }

    @media (max-width: 880px) {
      header {
        grid-template-columns: 1fr;
      }

      .topline {
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      aside {
        position: static;
        max-height: none;
      }

      .study {
        min-height: 680px;
      }

      .question {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Quiz do obrony MSI</h1>
      <div class="topline" aria-live="polite">
        <div class="stat"><strong id="statDone">0</strong><span>umiane</span></div>
        <div class="stat"><strong id="statHard">0</strong><span>trudne</span></div>
        <div class="stat"><strong id="statTotal">0</strong><span>w puli</span></div>
      </div>
    </header>

    <main>
      <aside>
        <div class="group">
          <div class="label">Tryb</div>
          <div class="segmented" role="tablist" aria-label="Tryb nauki">
            <button id="modeFlash" class="active" type="button">Fiszki</button>
            <button id="modeOral" type="button">Ustny</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Motyw</div>
          <div class="segmented" role="tablist" aria-label="Motyw">
            <button id="themeLight" class="active" type="button">Jasny</button>
            <button id="themeDark" type="button">Ciemny</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Szukaj</div>
          <input id="search" class="search" type="search" placeholder="np. Bellman, TSP, Hopfield">
        </div>

        <div class="group">
          <div class="label">Działy</div>
          <div id="topics" class="topics"></div>
        </div>

        <div class="group">
          <div class="label">Sesja</div>
          <div class="switches">
            <label class="switch"><input id="filterThesis" type="checkbox"> Pytania do pracy</label>
            <label class="switch"><input id="filterNew" type="checkbox"> Nowe</label>
            <label class="switch"><input id="filterHard" type="checkbox"> Trudne</label>
            <label class="switch"><input id="filterBad" type="checkbox"> Nie umiem</label>
            <label class="switch"><input id="shuffle" type="checkbox" checked> Losowa kolejność</label>
          </div>
        </div>

        <div class="group">
          <div class="label">Dane</div>
          <div class="side-actions">
            <button id="exportAnki" type="button">Anki CSV</button>
            <button id="reset" type="button">Reset</button>
          </div>
        </div>
      </aside>

      <section class="study" aria-live="polite">
        <div class="toolbar">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="counter">0 / 0</span>
              <span id="topicName">-</span>
            </div>
            <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
          </div>
          <div class="toolbar-actions">
            <button id="editAnswer" type="button">Edytuj</button>
            <div id="editTools" class="edit-tools" hidden>
              <button id="formatBold" class="format-btn" type="button" title="Pogrub zaznaczenie"><strong>B</strong></button>
              <button id="formatHighlight" class="format-btn" type="button" title="Zaznacz na żółto">HL</button>
              <button id="saveNote" type="button">Zapisz</button>
              <button id="cancelEdit" type="button">Anuluj</button>
              <button id="clearNote" type="button">Wyczyść</button>
            </div>
            <button id="prev" type="button">Poprzednie</button>
            <button id="nextTop" type="button">Następne</button>
          </div>
        </div>

        <div class="card-area" id="cardArea"></div>

        <div class="bottom">
          <div class="rating">
            <button id="showAnswer" class="primary" type="button">Pokaż odpowiedź</button>
            <button id="rateGood" class="good-btn" type="button">Umiem</button>
            <button id="rateHard" class="warn-btn" type="button">Trudne</button>
            <button id="rateBad" class="bad-btn" type="button">Nie umiem</button>
          </div>
          <button id="next" class="primary" type="button">Następne</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const cards = [
          {
                "id": "chomsky-1",
                "topic": "Teoria i złożoność",
                "q": "Jaka jest kolejność klas w hierarchii Chomsky'ego od najprostszej do najszerszej?",
                "a": "Typ 3: języki regularne i automaty skończone. Typ 2: języki bezkontekstowe i automaty ze stosem. Typ 1: języki kontekstowe i liniowo ograniczone maszyny Turinga. Typ 0: gramatyki bez ograniczeń i maszyny Turinga."
          },
          {
                "id": "chomsky-2",
                "topic": "Teoria i złożoność",
                "q": "Jaki automat odpowiada językom bezkontekstowym?",
                "a": "Językom bezkontekstowym odpowiada automat ze stosem. Stos daje pamięć LIFO, dzięki której można rozpoznawać struktury zagnieżdżone, np. poprawne nawiasowania albo język a^n b^n."
          },
          {
                "id": "complexity-1",
                "topic": "Teoria i złożoność",
                "q": "Co oznacza zapis T(n) = O(g(n))?",
                "a": "Zapis T(n)=O(g(n)) oznacza asymptotyczne ograniczenie górne: istnieją stałe c>0 i n0 takie, że dla każdego n>=n0 zachodzi T(n)<=c*g(n). Notacja O ignoruje stałe i małe instancje, dlatego mówi o tempie wzrostu, a nie o dokładnym czasie dla konkretnego wejścia. Jeśli chcemy podać dokładną klasę wzrostu, używamy Theta; jeśli dolne ograniczenie, Omega."
          },
          {
                "id": "pnp-1",
                "topic": "Teoria i złożoność",
                "q": "Jaka jest różnica między klasami P i NP?",
                "a": "P to klasa problemów decyzyjnych rozwiązywalnych w czasie wielomianowym przez deterministyczną maszynę Turinga, czyli praktycznie: mających znany efektywny algorytm. NP to problemy, dla których odpowiedź TAK ma certyfikat weryfikowalny w czasie wielomianowym. Każdy problem z P należy do NP, bo rozwiązanie można po prostu obliczyć i zweryfikować. Otwarte pytanie P=NP pyta, czy szybka weryfikacja zawsze oznacza szybkie znajdowanie rozwiązania."
          },
          {
                "id": "pnp-2",
                "topic": "Teoria i złożoność",
                "q": "Co znaczy, że problem jest NP-zupełny?",
                "a": "Problem jest NP-zupełny, gdy należy do NP i każdy problem z NP redukuje się do niego w czasie wielomianowym. To oznacza, że jest jednym z najtrudniejszych problemów w NP: gdyby znaleziono dla niego algorytm wielomianowy, to wszystkie problemy z NP miałyby algorytmy wielomianowe. W dowodzie zwykle pokazuje się: problem jest w NP oraz znany problem NP-zupełny redukuje się do niego."
          },
          {
                "id": "testing-random-1",
                "topic": "Teoria i złożoność",
                "q": "Dlaczego w testowaniu algorytmów losowych trzeba zapisywać ziarna generatorów?",
                "a": "Bez ziaren trudno odtworzyć przebieg, odróżnić błąd od naturalnej losowości i porównać poprawki kodu. Reprodukowalność jest pierwszym warunkiem sensownego debugowania metod losowych."
          },
          {
                "id": "experiment-1",
                "topic": "Teoria i złożoność",
                "q": "Co jest typowym błędem w eksperymentach obliczeniowych z ML?",
                "a": "Częsty błąd to przeciek danych: selekcja cech, skalowanie, imputacja albo dobór parametrów wykonane z użyciem zbioru testowego. Wynik testowy staje się wtedy zawyżony."
          },
          {
                "id": "tsp-1",
                "topic": "Algorytmy i numeryczne",
                "q": "Na czym polega problem komiwojażera?",
                "a": "Trzeba znaleźć najkrótszy cykl odwiedzający każde miasto dokładnie raz i wracający do punktu startowego. Wersja optymalizacyjna jest NP-trudna, a decyzyjna jest NP-zupełna."
          },
          {
                "id": "tsp-2",
                "topic": "Algorytmy i numeryczne",
                "q": "Jaką gwarancję daje algorytm Christofidesa dla symetrycznego metrycznego TSP?",
                "a": "Daje rozwiązanie o koszcie co najwyżej 3/2 optimum. Wykorzystuje MST, minimalne skojarzenie doskonałe na wierzchołkach nieparzystych, cykl Eulera i skracanie powtórzeń."
          },
          {
                "id": "interpolation-1",
                "topic": "Algorytmy i numeryczne",
                "q": "Czym interpolacja różni się od aproksymacji?",
                "a": "Interpolacja wymaga dokładnego przejścia przez zadane punkty. Aproksymacja dopuszcza błąd w punktach i szuka funkcji najlepiej pasującej według wybranego kryterium."
          },
          {
                "id": "interpolation-2",
                "topic": "Algorytmy i numeryczne",
                "q": "Co to jest efekt Rungego?",
                "a": "To silne oscylacje wielomianu interpolacyjnego wysokiego stopnia, zwykle przy końcach przedziału dla równoodległych węzłów. Przeciwdziała się mu przez splajny albo węzły Czebyszewa."
          },
          {
                "id": "linear-1",
                "topic": "Algorytmy i numeryczne",
                "q": "Po co stosuje się pivoting w eliminacji Gaussa?",
                "a": "Pivoting wybiera stabilniejszy element główny, unika dzielenia przez zero albo bardzo małą liczbę i ogranicza narastanie błędów numerycznych."
          },
          {
                "id": "linear-2",
                "topic": "Algorytmy i numeryczne",
                "q": "Kiedy szczególnie opłaca się rozkład LU?",
                "a": "Gdy rozwiązujemy wiele układów z tą samą macierzą A i różnymi prawymi stronami b. Rozkład liczymy raz, a potem wykonujemy szybkie podstawiania."
          },
          {
                "id": "roots-1",
                "topic": "Algorytmy i numeryczne",
                "q": "Jaka jest aktualizacja w metodzie Newtona dla zera funkcji jednej zmiennej?",
                "a": "x_{k+1} = x_k - f(x_k) / f'(x_k). Metoda jest szybka lokalnie, ale wymaga pochodnej i dobrego punktu startowego."
          },
          {
                "id": "roots-2",
                "topic": "Algorytmy i numeryczne",
                "q": "Dlaczego bisekcja jest wolniejsza, ale bezpieczna?",
                "a": "Działa dla funkcji ciągłej ze zmianą znaku na końcach przedziału i w każdym kroku zawęża przedział o połowę. Zbiega liniowo, ale ma gwarancję."
          },
          {
                "id": "integration-1",

    const STORAGE_KEY = "obronaQuizProgress.v1";
    const SESSION_KEY = "obronaQuizSession.v1";

    const VALID_THEMES = ["light", "dark"];

    const allTopics = [...new Set(cards.map(card => card.topic))];
    const THESIS_TOPICS = new Set([
      "OMR/SVS: wyniki i metodologia",
      "Lokalizacja tekstu i CV",

      "OMR i detekcja",

      "Integracja i ewaluacja"
    ]);
    const THESIS_ID_PREFIXES = ["work-tech-", "thesis-"];
    const savedSession = loadSession();

    const state = {
      mode: VALID_MODES.includes(savedSession.mode) ? savedSession.mode : "flash",
      theme: VALID_THEMES.includes(savedSession.theme) ? savedSession.theme : "light",

      order: Array.isArray(savedSession.order) ? savedSession.order.filter(id => cardById.has(id)) : [],

      progress: loadProgress(),
      answerVisible: Boolean(savedSession.answerVisible),
      editing: false

    init();

    function init() {
      applyTheme();
      applySessionToControls();
      renderTopics();
      bind();
      rebuildOrder(true);
      render();
    }

    function bind() {
      els.search.addEventListener("input", () => {
        persistEditingIfNeeded();
        state.index = 0;
        state.answerVisible = false;
        rebuildOrder();
        render();
      });
      [els.filterThesis, els.filterNew, els.filterHard, els.filterBad].forEach(input => {
        input.addEventListener("change", () => {
          persistEditingIfNeeded();
          state.index = 0;
          state.answerVisible = false;
          rebuildOrder();
          render();
        });
      });
      els.shuffle.addEventListener("change", () => {
        persistEditingIfNeeded();
        state.index = 0;
        state.answerVisible = false;
        rebuildOrder();
        render();
      });
      els.showAnswer.addEventListener("click", showAnswer);
      els.rateGood.addEventListener("click", () => rate("good"));
      els.rateHard.addEventListener("click", () => rate("hard"));
      els.rateBad.addEventListener("click", () => rate("bad"));
      els.next.addEventListener("click", next);
      els.nextTop.addEventListener("click", next);
      els.prev.addEventListener("click", prev);
      els.reset.addEventListener("click", resetProgress);
      els.exportAnki.addEventListener("click", exportAnki);
      els.modeFlash.addEventListener("click", () => setMode("flash"));
      els.modeOral.addEventListener("click", () => setMode("oral"));
      els.themeLight.addEventListener("click", () => setTheme("light"));
      els.themeDark.addEventListener("click", () => setTheme("dark"));
      els.editAnswer.addEventListener("click", () => setEditing(true));
      [els.formatBold, els.formatHighlight].forEach(button => {
        button.addEventListener("mousedown", event => event.preventDefault());
      });
      els.formatBold.addEventListener("click", () => formatSelection("bold"));
      els.formatHighlight.addEventListener("click", () => formatSelection("highlight"));
      els.saveNote.addEventListener("click", () => saveEditedAnswer());
      els.cancelEdit.addEventListener("click", cancelEditing);
      els.clearNote.addEventListener("click", clearEditedAnswer);
      window.addEventListener("beforeunload", () => {
        persistEditingIfNeeded();
        saveSession();
      });
    }

    function renderTopics() {
      const counts = countBy(cards, card => card.topic);
      els.topics.innerHTML = "";
      Object.keys(counts).sort().forEach(topic => {
        const id = "topic-" + slug(topic);
        const row = document.createElement("label");
        row.className = "topic-row";
        row.innerHTML = `
          <input type="checkbox" id="${id}" ${state.topics.has(topic) ? "checked" : ""}>
          <strong>${escapeHtml(topic)}</strong>
          <span>${counts[topic]}</span>
        `;
        row.querySelector("input").addEventListener("change", event => {
          persistEditingIfNeeded();
          if (event.target.checked) state.topics.add(topic);
          else state.topics.delete(topic);
          state.index = 0;
          state.answerVisible = false;
          rebuildOrder();
          render();
        });
        els.topics.appendChild(row);
      });
    }

    function setMode(mode) {
      persistEditingIfNeeded();
      state.mode = mode;
      syncModeButtons();
      render();
    }

    function setTheme(theme) {
      state.theme = theme;
      applyTheme();
      syncThemeButtons();
      saveSession();
    }

    function rebuildOrder(preserveOrder = false) {
      const query = normalize(els.search.value);
      const statusFilters = getSelectedStatusFilters();
      let pool = cards.filter(card => {
        if (!state.topics.has(card.topic)) return false;
        if (els.filterThesis.checked && !isThesisCard(card)) return false;
        if (statusFilters.size && !matchesStatusFilter(card.id, statusFilters)) return false;
        if (!query) return true;
        return normalize(card.q + " " + getSearchableAnswer(card) + " " + card.topic).includes(query);
      });
      const poolIds = pool.map(card => card.id);
      if (preserveOrder && state.order.length) {
        const poolSet = new Set(poolIds);
        const kept = state.order.filter(id => poolSet.has(id));
        const keptSet = new Set(kept);
        state.order = kept.concat(poolIds.filter(id => !keptSet.has(id)));
      } else {
        if (els.shuffle.checked) pool = shuffle(pool);
        state.order = pool.map(card => card.id);
      }
      if (state.index >= state.order.length) state.index = Math.max(0, state.order.length - 1);
      if (state.index < 0) state.index = 0;
    }

    function render() {
      renderStats();
      const card = currentCard();
      if (!card) {
        state.editing = false;
        els.cardArea.innerHTML = `<div class="empty">Brak pytań dla wybranych filtrów.</div>`;
        els.counter.textContent = "0 / 0";
        els.topicName.textContent = "-";
        els.progressBar.style.width = "0%";
        toggleAnswerControls(false);
        syncEditControls(null);
        saveSession();
        return;
      }

      const current = state.index + 1;
      const total = state.order.length;
      els.counter.textContent = `${current} / ${total}`;
      els.topicName.textContent = card.topic;
      els.progressBar.style.width = `${Math.round((current / total) * 100)}%`;
      toggleAnswerControls(true);
      updateRatingButtons(getStatus(card.id));
      renderFlash(card, state.mode === "oral");
      syncEditControls(card);
      saveSession();
    }

    function renderFlash(card, oral) {
      const status = getStatus(card.id);
      const answerClasses = ["answer"];
      if (state.answerVisible || state.editing) answerClasses.push("visible");
      const editAttrs = state.editing ? ` contenteditable="true" spellcheck="false" aria-label="Edytowana odpowiedź"` : "";
      els.cardArea.innerHTML = `
        <div class="meta-row">
          <span class="pill">${escapeHtml(card.topic)}</span>
          ${statusPill(status)}
          ${hasCustomAnswer(card.id) ? `<span class="pill note">notatki</span>` : ""}
        </div>
        <h2 class="question">${escapeHtml(card.q)}</h2>
        <div id="answer" class="${answerClasses.join(" ")}"${editAttrs}>${getAnswerHtml(card)}</div>
      `;
      els.showAnswer.textContent = oral ? "Pokaż konspekt" : "Pokaż odpowiedź";
    }

    function showAnswer() {
      const answer = document.getElementById("answer");
      if (answer) answer.classList.add("visible");
      state.answerVisible = true;
      saveSession();
    }

    function rate(value) {
      const card = currentCard();
      if (!card) return;
      persistEditingIfNeeded();
      mark(card.id, value);
      renderStats();
      if (getSelectedStatusFilters().size) {
        const previousIndex = state.index;
        const previousId = card.id;
        rebuildOrder(true);
        const keptIndex = state.order.indexOf(previousId);
        if (keptIndex >= 0 && state.order.length > 1) {
          state.index = (keptIndex + 1) % state.order.length;
        } else {
          state.index = Math.min(previousIndex, Math.max(0, state.order.length - 1));
        }
        state.answerVisible = false;
        render();
      } else {
        next();
      }
    }

    function mark(id, value) {
      if (!["good", "hard", "bad"].includes(value)) return;
      state.progress[id] = {
        ...(state.progress[id] || {}),
        status: value,
        updatedAt: Date.now()
      };
      saveProgress();
      updateRatingButtons(value);
    }

    function next() {
      if (!state.order.length) return;
      persistEditingIfNeeded();
      state.index = (state.index + 1) % state.order.length;
      state.answerVisible = false;
      render();
    }

    function prev() {
      if (!state.order.length) return;
      persistEditingIfNeeded();
      state.index = (state.index - 1 + state.order.length) % state.order.length;
      state.answerVisible = false;
      render();
    }

    function currentCard() {
      const id = state.order[state.index];
      return cardById.get(id);
    }

    function getStatus(id) {
      return state.progress[id]?.status || "";
    }

    function renderStats() {
      const pool = state.order.length ? state.order : cards.map(card => card.id);
      const statuses = cards.map(card => getStatus(card.id));
      els.statDone.textContent = statuses.filter(status => status === "good").length;
      els.statHard.textContent = statuses.filter(status => status === "hard" || status === "bad").length;
      els.statTotal.textContent = pool.length;
    }

    function resetProgress() {
      const ok = window.confirm("Usunąć zapisany postęp i notatki quizu?");
      if (!ok) return;
      state.editing = false;
      state.progress = {};
      state.index = 0;
      state.answerVisible = false;
      saveProgress();
      rebuildOrder();
      render();
    }

    function exportAnki() {
      const rows = [["Front", "Back", "Tags"]];
      cards.forEach(card => {
        rows.push([card.q, card.a, card.topic.replaceAll(" ", "_")]);
      });
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "obrona_anki.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function toggleAnswerControls(show) {
      els.showAnswer.style.display = show ? "" : "none";
      els.rateGood.style.display = show ? "" : "none";
      els.rateHard.style.display = show ? "" : "none";
      els.rateBad.style.display = show ? "" : "none";
      els.editAnswer.style.display = show ? "" : "none";
      if (!show) els.editTools.hidden = true;
    }

    function updateRatingButtons(status) {
      els.rateGood.classList.toggle("active", status === "good");
      els.rateHard.classList.toggle("active", status === "hard");
      els.rateBad.classList.toggle("active", status === "bad");
    }

    function statusPill(status) {
      if (status === "good") return `<span class="pill good">umiane</span>`;
      if (status === "hard") return `<span class="pill warn">trudne</span>`;
      if (status === "bad") return `<span class="pill bad">nie umiem</span>`;
      return `<span class="pill">nowe</span>`;
    }

    function loadProgress() {
      try {
        const normalized = normalizeProgress(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {});
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
        return normalized;
      } catch {
        return {};
      }
    }

    function normalizeProgress(raw) {
      return Object.entries(raw || {}).reduce((acc, [id, item]) => {
        if (!cardById.has(id)) return acc;
        const status = typeof item === "string" ? item : item?.status;
        const answerHtml = typeof item?.answerHtml === "string" ? sanitizeRichText(item.answerHtml) : "";
        if (!["good", "hard", "bad"].includes(status) && !answerHtml) return acc;
        acc[id] = {};
        if (["good", "hard", "bad"].includes(status)) {
          acc[id].status = status;
          acc[id].updatedAt = Number(item?.updatedAt) || 0;
        }
        if (answerHtml) {
          acc[id].answerHtml = answerHtml;
          acc[id].editedAt = Number(item?.editedAt) || 0;
        }
        return acc;
      }, {});
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function loadSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveSession() {
      const session = {
        mode: state.mode,
        theme: state.theme,
        index: state.index,
        order: state.order,
        topics: [...state.topics],
        search: els.search?.value || "",
        thesisOnly: Boolean(els.filterThesis?.checked),
        statusFilters: [...getSelectedStatusFilters()],
        shuffle: Boolean(els.shuffle?.checked),
        answerVisible: state.answerVisible,
        savedAt: Date.now()
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    function applySessionToControls() {
      els.search.value = typeof savedSession.search === "string" ? savedSession.search : "";
      els.shuffle.checked = typeof savedSession.shuffle === "boolean" ? savedSession.shuffle : true;
      els.filterThesis.checked = Boolean(savedSession.thesisOnly);
      const filters = new Set(Array.isArray(savedSession.statusFilters) ? savedSession.statusFilters : []);
      els.filterNew.checked = filters.has("new");
      els.filterHard.checked = filters.has("hard");
      els.filterBad.checked = filters.has("bad");
      syncModeButtons();
      syncThemeButtons();
    }

    function normalizeSavedTopics(topics) {
      if (!Array.isArray(topics)) return allTopics;
      const known = new Set(allTopics);
      return topics.filter(topic => known.has(topic));
    }

    function applyTheme() {
      document.body.dataset.theme = state.theme;
    }

    function syncModeButtons() {
      els.modeFlash.classList.toggle("active", state.mode === "flash");
      els.modeOral.classList.toggle("active", state.mode === "oral");
    }

    function syncThemeButtons() {
      els.themeLight.classList.toggle("active", state.theme === "light");
      els.themeDark.classList.toggle("active", state.theme === "dark");
    }

    function getSelectedStatusFilters() {
      const filters = new Set();
      if (els.filterNew?.checked) filters.add("new");
      if (els.filterHard?.checked) filters.add("hard");
      if (els.filterBad?.checked) filters.add("bad");
      return filters;
    }

    function matchesStatusFilter(id, filters) {
      const status = getStatus(id);
      return (filters.has("new") && !status)
        || (filters.has("hard") && status === "hard")
        || (filters.has("bad") && status === "bad");
    }

    function isThesisCard(card) {
      return Boolean(card.thesis)
        || THESIS_TOPICS.has(card.topic)
        || THESIS_ID_PREFIXES.some(prefix => card.id.startsWith(prefix));
    }

    function setEditing(active) {
      const card = currentCard();
      if (!card) return;
      state.editing = active;
      state.answerVisible = true;
      render();
      if (active) {
        const answer = document.getElementById("answer");
        if (answer) answer.focus();
      }
    }

    function syncEditControls(card) {
      const hasCard = Boolean(card);
      els.editAnswer.disabled = !hasCard;
      els.editAnswer.classList.toggle("active", state.editing);
      els.editAnswer.textContent = state.editing ? "Edycja" : "Edytuj";
      els.editTools.hidden = !state.editing;
      els.clearNote.hidden = !card || !hasCustomAnswer(card.id);
    }

    function formatSelection(kind) {
      const answer = document.getElementById("answer");
      if (!state.editing || !answer) return;
      answer.focus();
      if (kind === "bold") {
        document.execCommand("bold", false);
        return;
      }
      if (kind === "highlight") {
        const ok = document.execCommand("hiliteColor", false, "#fff29a");
        if (!ok) document.execCommand("backColor", false, "#fff29a");
      }
    }

    function saveEditedAnswer(options = {}) {
      const { keepEditing = false, rerender = true } = options;
      const card = currentCard();
      const answer = document.getElementById("answer");
      if (!card || !answer) return;
      const cleaned = sanitizeRichText(answer.innerHTML);
      const base = sanitizeRichText(formatAnswer(card.a));
      const item = { ...(state.progress[card.id] || {}) };
      if (normalizeRichText(cleaned) === normalizeRichText(base)) {
        delete item.answerHtml;
        delete item.editedAt;
      } else {
        item.answerHtml = cleaned;
        item.editedAt = Date.now();
      }
      if (item.status || item.answerHtml) state.progress[card.id] = item;
      else delete state.progress[card.id];
      state.editing = keepEditing;
      state.answerVisible = true;
      saveProgress();
      if (rerender) render();
    }

    function cancelEditing() {
      state.editing = false;
      render();
    }

    function clearEditedAnswer() {
      const card = currentCard();
      if (!card) return;
      const item = { ...(state.progress[card.id] || {}) };
      delete item.answerHtml;
      delete item.editedAt;
      if (item.status) state.progress[card.id] = item;
      else delete state.progress[card.id];
      state.editing = false;
      state.answerVisible = true;
      saveProgress();
      render();
    }

    function persistEditingIfNeeded() {
      if (state.editing) saveEditedAnswer({ keepEditing: false, rerender: false });
    }

    function hasCustomAnswer(id) {
      return Boolean(state.progress[id]?.answerHtml);
    }

    function getAnswerHtml(card) {
      return state.progress[card.id]?.answerHtml || formatAnswer(card.a);
    }

    function getSearchableAnswer(card) {
      const customAnswer = state.progress[card.id]?.answerHtml || "";
      return card.a + " " + plainTextFromHtml(customAnswer);
    }

    function sanitizeRichText(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      const output = document.createElement("div");
      template.content.childNodes.forEach(node => output.appendChild(sanitizeNode(node)));
      return output.innerHTML.replace(/(<br>)+$/g, "");
    }

    function sanitizeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return document.createTextNode(node.textContent || "");
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return document.createDocumentFragment();
      }

      const tag = node.tagName;
      if (tag === "BR") return document.createElement("br");

      const fragment = document.createDocumentFragment();
      node.childNodes.forEach(child => fragment.appendChild(sanitizeNode(child)));

      if (tag === "B" || tag === "STRONG") {
        const strong = document.createElement("strong");
        strong.appendChild(fragment);
        return strong;
      }

      if (tag === "MARK" || hasHighlightStyle(node)) {
        const mark = document.createElement("mark");
        mark.appendChild(fragment);
        return mark;
      }

      if (tag === "DIV" || tag === "P") {
        fragment.appendChild(document.createElement("br"));
      }

      return fragment;
    }

    function hasHighlightStyle(node) {
      const style = node.getAttribute("style") || "";
      return /background(-color)?:/i.test(style);
    }

    function normalizeRichText(html) {
      return html.replace(/\s+/g, " ").replace(/>\s+</g, "><").trim();
    }

    function plainTextFromHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      return template.content.textContent || "";
    }

    function countBy(items, fn) {
      return items.reduce((acc, item) => {
        const key = fn(item);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(value) {
      return value.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function slug(value) {
      return normalize(value).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatAnswer(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }
  </script>
</body>
</html>
