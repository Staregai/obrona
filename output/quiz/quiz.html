<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz do obrony MSI</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --text: #18202a;
      --muted: #617080;
      --line: #d8e0e8;
      --accent: #1f7a8c;
      --accent-2: #6d597a;
      --good: #247a4d;
      --bad: #b33b3b;
      --warn: #a56a1d;
      --focus: #f2c14e;
      --shadow: 0 12px 28px rgba(22, 35, 50, 0.10);
      --button-hover-bg: #fafcfe;
      --button-hover-border: #a9bac9;
      --input-bg: #ffffff;
      --progress-bg: #e8edf2;
      --answer-bg: #f7fbfc;
      --empty-bg: #fbfcfe;
      --good-bg: #edf7f1;
      --good-line: #c6e4d2;
      --bad-bg: #fff0f0;
      --bad-line: #f1c9c9;
      --warn-bg: #fff6e8;
      --warn-line: #efd4aa;
      --highlight: #fff29a;
      --highlight-text: #1f1a00;
      --edit-bg: #fffdf4;
    }

    * { box-sizing: border-box; }

    body[data-theme="dark"] {
      --bg: #11151b;
      --surface: #18212b;
      --surface-2: #222e3a;
      --text: #edf2f7;
      --muted: #a9b6c3;
      --line: #344353;
      --accent: #4aa3b5;
      --accent-2: #c49bd0;
      --good: #82d99b;
      --bad: #ff8c8c;
      --warn: #f0bd62;
      --focus: #f2c14e;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
      --button-hover-bg: #22303d;
      --button-hover-border: #536577;
      --input-bg: #121922;
      --progress-bg: #101820;
      --answer-bg: #14262d;
      --empty-bg: #141b23;
      --good-bg: #173525;
      --good-line: #2e6743;
      --bad-bg: #3b1d24;
      --bad-line: #7a3a45;
      --warn-bg: #362917;
      --warn-line: #74542a;
      --highlight: #ffdf6e;
      --highlight-text: #1d1700;
      --edit-bg: #211f18;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      min-height: 38px;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(242, 193, 78, 0.65);
      outline-offset: 2px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      line-height: 1.2;
    }

    .topline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 7px;
      padding: 7px 10px;
      min-width: 94px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 310px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    aside,
    .study {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      align-self: start;
      padding: 16px;
      position: sticky;
      top: 86px;
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .group {
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .group:last-child {
      border-bottom: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      min-height: 42px;
      background: var(--surface);
    }

    .segmented button:last-child { border-right: 0; }

    .segmented button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      min-height: 40px;
      padding: 0 10px;
      color: var(--text);
      background: var(--input-bg);
    }

    .topics {
      display: grid;
      gap: 7px;
    }

    .topic-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .topic-actions button {
      padding: 8px 9px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
    }

    .topic-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .topic-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .switches {
      display: grid;
      gap: 8px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 32px;
    }

    .switch input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent-2);
    }

    .seed-row {
      color: var(--muted);
      display: grid;
      gap: 6px;
      font-size: 12px;
      line-height: 1.35;
      padding-left: 25px;
      word-break: break-all;
    }

    .seed-row code {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      padding: 2px 6px;
    }

    .seed-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 6px;
      align-items: center;
    }

    .seed-controls input {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      padding: 7px 8px;
    }

    .seed-controls button {
      padding: 7px 9px;
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .blacklist-lists {
      display: grid;
      gap: 12px;
    }

    .blacklist-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 10px;
    }

    .blacklist-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .blacklist-header span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .blacklist-header button,
    .blacklist-item button {
      padding: 6px 8px;
    }

    .blacklist-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .blacklist-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .blacklist-question {
      min-width: 0;
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
    }

    .blacklist-topic,
    .blacklist-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .study {
      min-height: calc(100vh - 116px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress-wrap {
      min-width: min(360px, 100%);
      flex: 1;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--progress-bg);
      border: 1px solid var(--line);
    }

    .progress div {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--focus));
      width: 0%;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-area {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.good { color: var(--good); background: var(--good-bg); border-color: var(--good-line); }
    .pill.bad { color: var(--bad); background: var(--bad-bg); border-color: var(--bad-line); }
    .pill.warn { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-line); }
    .pill.note { color: var(--accent-2); }

    .question {
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.18;
      font-weight: 800;
      max-width: 1050px;
      margin: 0;
    }

    .answer {
      display: none;
      border-left: 4px solid var(--accent);
      background: var(--answer-bg);
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      max-width: 1050px;
      font-size: 17px;
      line-height: 1.55;
    }

    .answer.visible {
      display: block;
    }

    .answer[contenteditable="true"] {
      display: block;
      background: var(--edit-bg);
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      min-height: 150px;
    }

    .answer mark {
      background: var(--highlight);
      color: var(--highlight-text);
      padding: 0 2px;
      border-radius: 3px;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rating {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .edit-tools[hidden] {
      display: none;
    }

    .format-btn {
      min-width: 42px;
      padding: 0 10px;
      font-weight: 800;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 800;
    }

    .primary:hover {
      background: #176a7a;
      border-color: #176a7a;
    }

    .good-btn {
      border-color: var(--good-line);
      color: var(--good);
      background: var(--good-bg);
    }

    .warn-btn {
      border-color: var(--warn-line);
      color: var(--warn);
      background: var(--warn-bg);
    }

    .bad-btn {
      border-color: var(--bad-line);
      color: var(--bad);
      background: var(--bad-bg);
    }

    .danger-action {
      border-color: var(--bad-line);
      color: var(--bad);
      background: var(--bad-bg);
    }

    .rating button.active {
      box-shadow: inset 0 0 0 2px currentColor;
      font-weight: 800;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 30px;
      color: var(--muted);
      border-radius: 8px;
      background: var(--empty-bg);
      max-width: 720px;
    }

    @media (max-width: 880px) {
      header {
        grid-template-columns: 1fr;
      }

      .topline {
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      aside {
        position: static;
        max-height: none;
      }

      .study {
        min-height: 680px;
      }

      .question {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Quiz do obrony MSI</h1>
      <div class="topline" aria-live="polite">
        <div class="stat"><strong id="statDone">0</strong><span>umiane</span></div>
        <div class="stat"><strong id="statHard">0</strong><span>trudne</span></div>
        <div class="stat"><strong id="statTotal">0</strong><span>w puli</span></div>
      </div>
    </header>

    <main>
      <aside>
        <div class="group">
          <div class="label">Baza</div>
          <div class="segmented" role="tablist" aria-label="Baza pytań">
            <button id="deckMain" class="active" type="button">Główna</button>
            <button id="deckBank" type="button">Bank 37+</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Tryb</div>
          <div class="segmented" role="tablist" aria-label="Tryb nauki">
            <button id="modeFlash" class="active" type="button">Fiszki</button>
            <button id="modeOral" type="button">Ustny</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Motyw</div>
          <div class="segmented" role="tablist" aria-label="Motyw">
            <button id="themeLight" class="active" type="button">Jasny</button>
            <button id="themeDark" type="button">Ciemny</button>
          </div>
        </div>

        <div class="group">
          <div class="label">Szukaj</div>
          <input id="search" class="search" type="search" placeholder="np. Bellman, TSP, Hopfield">
        </div>

        <div class="group">
          <div class="label">Działy</div>
          <div class="topic-actions">
            <button id="selectAllTopics" type="button">Zaznacz wszystkie</button>
            <button id="clearAllTopics" type="button">Odznacz wszystkie</button>
          </div>
          <div id="topics" class="topics"></div>
        </div>

        <div id="mainCommitteeGroup" class="group">
          <div class="label">Komisja</div>
          <div class="topic-actions">
            <button id="selectAllCommittee" type="button">Zaznacz wszystko</button>
            <button id="clearCommittee" type="button">Odznacz wszystko</button>
          </div>
          <div class="switches">
            <label class="switch"><input id="filterCommitteeAll" type="checkbox"> Cała komisja</label>
            <label class="switch"><input id="filterCommitteeMacukow" type="checkbox"> B. Macukow</label>
            <label class="switch"><input id="filterCommitteeRadzikowska" type="checkbox"> A. Radzikowska</label>
            <label class="switch"><input id="filterCommitteeRafalko" type="checkbox"> J. Rafałko</label>
            <label class="switch"><input id="filterCommitteeBalicki" type="checkbox"> J. Balicki</label>
            <label class="switch"><input id="filterCommitteeThesis" type="checkbox"> Zakres pracy</label>
          </div>
        </div>

        <div class="group">
          <div class="label">Sesja</div>
          <div class="switches">
            <label id="mainFilterThesis" class="switch"><input id="filterThesis" type="checkbox"> Pytania do pracy</label>
            <label id="mainFilterMini" class="switch"><input id="filterMini" type="checkbox"> Pytania ze strony MiNI</label>
            <label class="switch"><input id="filterNew" type="checkbox"> Nowe</label>
            <label class="switch"><input id="filterHard" type="checkbox"> Trudne</label>
            <label class="switch"><input id="filterBad" type="checkbox"> Nie umiem</label>
            <label class="switch"><input id="shuffle" type="checkbox" checked> Losowa kolejność</label>
            <div id="seedRow" class="seed-row">
              <label for="seedInput">Seed</label>
              <div class="seed-controls">
                <input id="seedInput" type="text" autocomplete="off" spellcheck="false" aria-label="Seed losowania">
                <button id="applySeed" type="button">Ustaw</button>
                <button id="newSeed" type="button">Nowy</button>
              </div>
            </div>
          </div>
        </div>

        <div class="group">
          <div class="label">Dane</div>
          <div class="side-actions">
            <button id="exportAnki" type="button">Anki CSV</button>
            <button id="reset" type="button">Reset</button>
            <button id="exportState" type="button">Eksport stanu</button>
            <button id="importState" type="button">Import stanu</button>
            <input id="stateFile" type="file" accept="application/json,.json" hidden>
          </div>
        </div>

        <div class="group">
          <div class="label">Blacklisted</div>
          <div class="blacklist-lists">
            <div class="blacklist-section">
              <div class="blacklist-header">
                <strong>Główna</strong>
                <span id="blacklistMainCount">0</span>
                <button id="restoreMainBlacklist" type="button">Przywróć wszystkie</button>
              </div>
              <div id="blacklistMain" class="blacklist-list"></div>
            </div>
            <div class="blacklist-section">
              <div class="blacklist-header">
                <strong>Bank 37+</strong>
                <span id="blacklistBankCount">0</span>
                <button id="restoreBankBlacklist" type="button">Przywróć wszystkie</button>
              </div>
              <div id="blacklistBank" class="blacklist-list"></div>
            </div>
          </div>
        </div>
      </aside>

      <section class="study" aria-live="polite">
        <div class="toolbar">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="counter">0 / 0</span>
              <span id="topicName">-</span>
            </div>
            <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
          </div>
          <div class="toolbar-actions">
            <button id="editAnswer" type="button">Edytuj</button>
            <button id="blacklistCurrent" class="danger-action" type="button">Ukryj</button>
            <div id="editTools" class="edit-tools" hidden>
              <button id="formatBold" class="format-btn" type="button" title="Pogrub zaznaczenie"><strong>B</strong></button>
              <button id="formatHighlight" class="format-btn" type="button" title="Zaznacz na żółto">HL</button>
              <button id="saveNote" type="button">Zapisz</button>
              <button id="cancelEdit" type="button">Anuluj</button>
              <button id="clearNote" type="button">Wyczyść</button>
            </div>
            <button id="prev" type="button">Poprzednie</button>
            <button id="nextTop" type="button">Następne</button>
          </div>
        </div>

        <div class="card-area" id="cardArea"></div>

        <div class="bottom">
          <div class="rating">
            <button id="showAnswer" class="primary" type="button">Pokaż odpowiedź</button>
            <button id="rateGood" class="good-btn" type="button">Umiem</button>
            <button id="rateHard" class="warn-btn" type="button">Trudne</button>
            <button id="rateBad" class="bad-btn" type="button">Nie umiem</button>
          </div>
          <button id="next" class="primary" type="button">Następne</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const cards = [
          {
                    "id": "chomsky-1",
                    "topic": "Teoria i złożoność",
                    "q": "Jaka jest kolejność klas w hierarchii Chomsky'ego od najprostszej do najszerszej?",
                    "a": "Typ 3: języki regularne i automaty skończone. Typ 2: języki bezkontekstowe i automaty ze stosem. Typ 1: języki kontekstowe i liniowo ograniczone maszyny Turinga. Typ 0: gramatyki bez ograniczeń i maszyny Turinga."
          },
          {
                    "id": "chomsky-2",
                    "topic": "Teoria i złożoność",
                    "q": "Jaki automat odpowiada językom bezkontekstowym?",
                    "a": "Językom bezkontekstowym odpowiada automat ze stosem. Stos daje pamięć LIFO, dzięki której można rozpoznawać struktury zagnieżdżone, np. poprawne nawiasowania albo język a^n b^n."
          },
          {
                    "id": "complexity-1",
                    "topic": "Teoria i złożoność",
                    "q": "Co oznacza zapis T(n) = O(g(n))?",
                    "a": "Zapis T(n)=O(g(n)) oznacza asymptotyczne ograniczenie górne: istnieją stałe c>0 i n0 takie, że dla każdego n>=n0 zachodzi T(n)<=c*g(n). Notacja O ignoruje stałe i małe instancje, dlatego mówi o tempie wzrostu, a nie o dokładnym czasie dla konkretnego wejścia. Jeśli chcemy podać dokładną klasę wzrostu, używamy Theta; jeśli dolne ograniczenie, Omega."
          },
          {
                    "id": "pnp-1",
