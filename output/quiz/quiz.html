            "a": "Szacuje się krok względem linii i pól, uwzględnia klucz, linie dodane, znaki przykluczowe i lokalne znaki chromatyczne, a następnie wyznacza nazwę nuty, oktawę i MIDI."
      },
      {
            "id": "bank-181",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 181,
            "q": "Co to jest numer MIDI nuty?",
            "a": "Liczba całkowita reprezentująca wysokość w stroju równomiernie temperowanym. A4 ma numer 69 i częstotliwość 440 Hz."
      },
      {
            "id": "bank-182",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 182,
            "q": "Jak przeliczyć MIDI na częstotliwość?",
            "a": "f = 440 · 2(m−69)/12. Każde zwiększenie MIDI o 12 podwaja częstotliwość."
      },
      {
            "id": "bank-183",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 183,
            "q": "Co to jest znak chromatyczny?",
            "a": "Krzyżyk, bemol lub kasownik zmieniający wysokość nuty. Może działać lokalnie w takcie lub być częścią znaku przykluczowego."
      },
      {
            "id": "bank-184",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 184,
            "q": "Co to jest znak przykluczowy?",
            "a": "Zestaw krzyżyków lub bemoli przy kluczu określający domyślne modyfikacje stopni w danej tonacji."
      },
      {
            "id": "bank-185",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 185,
            "q": "Co to jest metrum?",
            "a": "Organizacja pulsu w takty. Licznik określa liczbę jednostek, a mianownik wartość jednostki, np. 4/4 oznacza cztery ćwierćnuty."
      },
      {
            "id": "bank-186",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 186,
            "q": "Co to jest tempo BPM?",
            "a": "Liczba uderzeń na minutę. Przy 120 BPM ćwierćnuta, jeżeli jest jednostką pulsu, trwa 0,5 sekundy."
      },
      {
            "id": "bank-187",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 187,
            "q": "Jak przeliczyć beat na sekundy?",
            "a": "Dla ćwierćnutowego pulsu czas jednego beatu wynosi 60 / BPM sekund. Czas zdarzenia to liczba beatów pomnożona przez czas jednego beatu."
      },
      {
            "id": "bank-188",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 188,
            "q": "Od czego zależy długość nuty?",
            "a": "Od typu notehead, obecności stem, flag i beams, augmentation dot, tupletu, tie oraz kontekstu metrum."
      },
      {
            "id": "bank-189",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 189,
            "q": "Jak działa augmentation dot?",
            "a": "Dodaje połowę wartości podstawowej. Ćwierćnuta z kropką trwa 1 + 0, 5 = 1, 5 ćwierćnuty."
      },
      {
            "id": "bank-190",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 190,
            "q": "Jak belki określają rytm?",
            "a": "Jedna belka zwykle odpowiada ósemkom, dwie szesnastkom itd. Trzeba poprawnie przypisać belkę do laseczek i główek nut."
      },
      {
            "id": "bank-191",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 191,
            "q": "Czym tie różni się od slur?",
            "a": "Tie łączy nuty tej samej wysokości i sumuje ich czas. Slur oznacza frazowanie lub legato i może łączyć różne wysokości."
      },
      {
            "id": "bank-192",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 192,
            "q": "Co to jest melisma?",
            "a": "Śpiewanie jednej sylaby na kilku nutach. W danych SVS kolejne nuty mogą kontynuować ten sam tekst lub fonem samogłoskowy."
      },
      {
            "id": "bank-193",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 193,
            "q": "Co to jest takt przedtaktowy?",
            "a": "Niepełny takt na początku utworu, którego czas często uzupełnia ostatni takt. Nie powinien być automatycznie dopełniany do pełnego metrum bez rozpoznania kontekstu."
      },
      {
            "id": "bank-194",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 194,
            "q": "Co to jest polifonia?",
            "a": "Jednoczesne prowadzenie kilku niezależnych głosów. Utrudnia przypisanie nut do osi czasu, tekstu i poszczególnych partii."
      },
      {
            "id": "bank-195",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 195,
            "q": "Co to jest akord?",
            "a": "Kilka wysokości rozpoczynających się w przybliżeniu jednocześnie. W wokalnym SVS trzeba wybrać pojedynczy głos lub generować kilka ścieżek."
      },
      {
            "id": "bank-196",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 196,
            "q": "Po co są kreski taktowe?",
            "a": "Wyznaczają granice taktów i pomagają grupować zdarzenia zgodnie z metrum. Mogą być mylone z laseczkami."
      },
      {
            "id": "bank-197",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 197,
            "q": "Co to jest synthetic rest?",
            "a": "Pauza dodana przez warstwę naprawczą, aby uzupełnić brakujący czas w takcie. Musi być jawnie oznaczona jako inferencja, a nie detekcja z obrazu."
      },
      {
            "id": "bank-198",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 198,
            "q": "Dlaczego nadmiarowego czasu w takcie nie należy dowolnie usuwać?",
            "a": "Nie wiadomo, która nuta jest błędna. Automatyczne usunięcie może zniszczyć poprawną muzykę. Bezpieczniej zapisać ostrzeżenie lub zaproponować ręczną korektę."
      },
      {
            "id": "bank-199",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 199,
            "q": "Co to jest dynamic programming w dopasowaniu tekstu?",
            "a": "Metoda znajdująca globalnie najtańszą sekwencję przypisań tokenów do nut, uwzględniając koszty dopasowań, pominięć, pauz i melism."
      },
      {
            "id": "bank-200",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 200,
            "q": "Dlaczego proste przypisanie najbliższego tekstu do nuty może zawieść?",
            "a": "Tekst może być przesunięty, jedna sylaba może obejmować wiele nut, występują pauzy, kilka zwrotek i błędy OCR. Lokalnie najbliższe przypisanie nie musi być globalnie spójne."
      },
      {
            "id": "bank-201",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 201,
            "q": "Co to jest MusicXML?",
            "a": "Strukturalny format wymiany zapisu muzycznego opisujący nuty, rytm, takty, głosy, tekst i oznaczenia wykonawcze. Jest bogatszy semantycznie niż MIDI."
      },
      {
            "id": "bank-202",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 202,
            "q": "Co to jest MIDI?",
            "a": "Format zdarzeń sterujących: wysokość, początek, koniec, velocity i instrument. Nie przechowuje pełnego wyglądu partytury ani naturalnego audio."
      },
      {
            "id": "bank-203",
            "topic": "Bank 37+: Score IR i teoria muzyki",
            "sourceQuestion": 203,
            "q": "Czym MusicXML różni się od MIDI?",
            "a": "MusicXML reprezentuje notację i strukturę partytury. MIDI reprezentuje wykonanie czasowe i komunikaty sterujące. Konwersja pomiędzy nimi może być stratna. 8. Pytania ogólne: audio i SVS"
      },
      {
            "id": "bank-204",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 204,
            "q": "Czym SVS różni się od TTS?",
            "a": "SVS oprócz tekstu musi realizować jawnie zadaną wysokość, rytm i sposób prowadzenia głosu. Śpiew ma dłuższe samogłoski, szerszy zakres F0, vibrato i inne zależności prozodyczne."
      },
      {
            "id": "bank-205",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 205,
            "q": "Co zawiera wejście SVS?",
            "a": "Fonemy lub sylaby, początek i koniec zdarzenia, wysokość nuty, pauzy, voiced, głos, styl, tempo oraz opcjonalne cechy wykonawcze."
      },
      {
            "id": "bank-206",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 206,
            "q": "Dlaczego stosuje się fonemy zamiast słów?",
            "a": "Fonemy pozwalają generować nowe słowa, dokładniej sterować wymową i czasem poszczególnych głosek oraz lepiej dopasować tekst do nut."
      },
      {
            "id": "bank-207",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 207,
            "q": "Co to jest grafem?",
            "a": "Jednostka zapisu, np. litera lub znak. Relacja grafem–fonem nie jest jednoznaczna, szczególnie w języku angielskim."
      },
      {
            "id": "bank-208",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 208,
            "q": "Co to jest fonem?",
            "a": "Najmniejsza jednostka dźwiękowa rozróżniająca znaczenie. Model SVS wykorzystuje tokeny fonemowe jako reprezentację wymowy."
      },
      {
            "id": "bank-209",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 209,
            "q": "Co to jest G2P?",
            "a": "Grapheme-to-phoneme: algorytm lub model zamieniający zapis słowa na sekwencję fonemów."
      },
      {
            "id": "bank-210",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 210,
            "q": "Co to jest ARPAbet?",
            "a": "ASCII-owa reprezentacja angielskich fonemów używana m.in. w CMU Pronouncing Dictionary. Samogłoski mogą zawierać oznaczenie akcentu."
      },
      {
            "id": "bank-211",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 211,
            "q": "Co to jest CMUdict?",
            "a": "Słownik wymowy angielskich słów zapisanych w ARPAbet. Pomaga uzyskać poprawniejsze fonemy niż proste reguły literowe."
      },
      {
            "id": "bank-212",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 212,
            "q": "Dlaczego samogłoski otrzymują więcej czasu niż spółgłoski?",
            "a": "W śpiewie samogłoska niesie podtrzymywaną wysokość i energię, natomiast większość spółgłosek tworzy krótki atak lub zakończenie."
      },
      {
            "id": "bank-213",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 213,
            "q": "Co to jest waveform?",
            "a": "Sekwencja próbek amplitudy sygnału audio w czasie. Jest końcowym formatem generowanym przez wokoder."
      },
      {
            "id": "bank-214",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 214,
            "q": "Co oznacza sample rate 22050 Hz?",
            "a": "Audio zawiera 22050 próbek na sekundę. Maksymalna reprezentowalna częstotliwość wynosi w przybliżeniu 11025 Hz."
      },
      {
            "id": "bank-215",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 215,
            "q": "Co to jest częstotliwość Nyquista?",
            "a": "Połowa częstotliwości próbkowania. Składowe powyżej niej powodują aliasing, jeżeli nie zostaną odfiltrowane."
      },
      {
            "id": "bank-216",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 216,
            "q": "Co to jest aliasing?",
            "a": "Zniekształcenie, w którym częstotliwości powyżej Nyquista pojawiają się jako fałszywe niższe częstotliwości."
      },
      {
            "id": "bank-217",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 217,
            "q": "Co to jest transformata Fouriera?",
            "a": "Rozkłada sygnał na składowe częstotliwościowe, opisując amplitudę i fazę sinusoid."
      },
      {
            "id": "bank-218",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 218,
            "q": "Co to jest STFT?",
            "a": "Short-Time Fourier Transform liczy transformatę Fouriera w kolejnych nakładających się oknach, tworząc reprezentację czas–częstotliwość."
      },
      {
            "id": "bank-219",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 219,
            "q": "Co oznacza FFT size 1024?",
            "a": "Liczbę punktów transformacji. Wpływa na siatkę częstotliwości i koszt obliczeń. Nie jest tożsama z liczbą pasm mel."
      },
      {
            "id": "bank-220",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 220,
            "q": "Co to jest window length?",
            "a": "Liczba próbek analizowanych w jednej ramce STFT. Dłuższe okno daje lepszą rozdzielczość częstotliwości kosztem czasu."
      },
      {
            "id": "bank-221",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 221,
            "q": "Co to jest hop length?",
            "a": "Przesunięcie pomiędzy kolejnymi oknami. Hop 256 przy 22050 Hz daje krok około 11,6 ms."
      },
      {
            "id": "bank-222",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 222,
            "q": "Co to jest spektrogram?",
            "a": "Macierz energii lub amplitudy częstotliwości w kolejnych chwilach czasu."
      },
      {
            "id": "bank-223",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 223,
            "q": "Co to jest skala mel?",
            "a": "Nieliniowa skala częstotliwości przybliżająca percepcję człowieka: większa dokładność dla niższych częstotliwości i silniejsze grupowanie wysokich."
      },
      {
            "id": "bank-224",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 224,
            "q": "Co to jest mel-spektrogram?",
            "a": "Spektrogram, którego częstotliwości są rzutowane na bank filtrów mel. Jest standardową reprezentacją pośrednią w TTS i SVS."
      },
      {
            "id": "bank-225",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 225,
            "q": "Dlaczego stosuje się log-mel?",
            "a": "Logarytm kompresuje duży zakres energii i lepiej odpowiada percepcji głośności. Ułatwia również uczenie modelu."
      },
      {
            "id": "bank-226",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 226,
            "q": "Czego mel-spektrogram nie przechowuje?",
            "a": "Nie przechowuje pełnej informacji fazowej i redukuje szczegóły widma. Dlatego rekonstrukcja waveformu nie jest jednoznaczna."
      },
      {
            "id": "bank-227",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 227,
            "q": "Co to jest F0?",
            "a": "Częstotliwość podstawowa sygnału okresowego, związana z postrzeganą wysokością głosu."
      },
      {
            "id": "bank-228",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 228,
            "q": "Czym F0 różni się od formantu?",
            "a": "F0 wynika z okresowości źródła głosu i określa postrzeganą wysokość. Formanty to rezonanse traktu głosowego, które kształtują samogłoskę i barwę."
      },
      {
            "id": "bank-229",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 229,
            "q": "Co to jest cent?",
            "a": "Logarytmiczna jednostka interwału. 100 centów to półton, 1200 centów oktawa."
      },
      {
            "id": "bank-230",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 230,
            "q": "Jak liczy się błąd wysokości w centach?",
            "a": "Błąd wysokości liczy się jako 1200 * log2(F0_pred / F0_ref). MAE wykorzystuje wartość bezwzględną tego błędu, zwykle tylko na ramkach voiced."
      },
      {
            "id": "bank-231",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 231,
            "q": "Dlaczego błąd w hercach byłby mniej muzyczny?",
            "a": "Ta sama różnica Hz oznacza inny interwał przy niskiej i wysokiej częstotliwości. Centy mierzą względną zmianę wysokości."
      },
      {
            "id": "bank-232",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 232,
            "q": "Co to jest voiced/unvoiced?",
            "a": "Informacja, czy ramka ma regularną strukturę okresową i zdefiniowane F0. Samogłoski są zwykle voiced, a cisza i spółgłoski bezdźwięczne są unvoiced."
      },
      {
            "id": "bank-233",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 233,
            "q": "Dlaczego F0 mierzy się tylko na ramkach voiced?",
            "a": "Dla ciszy i szumu bezdźwięcznego częstotliwość podstawowa nie jest zdefiniowana. Wymuszenie wartości prowadziłoby do sztucznych błędów."
      },
      {
            "id": "bank-234",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 234,
            "q": "Co to jest pYIN?",
            "a": "Probabilistyczny algorytm estymacji F0, rozszerzający YIN o model probabilistyczny i śledzenie wysokości w czasie."
      },
      {
            "id": "bank-235",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 235,
            "q": "Jakie błędy może popełniać estymator F0?",
            "a": "Błędy oktawowe, utrata detekcji, błędna klasyfikacja voiced/unvoiced oraz śledzenie harmonicznej zamiast częstotliwości podstawowej."
      },
      {
            "id": "bank-236",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 236,
            "q": "Co to jest energia ramki?",
            "a": "Miara amplitudy lub mocy sygnału w krótkim oknie. W SVS steruje obwiednią głośności i dynamiką."
      },
      {
            "id": "bank-237",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 237,
            "q": "Co to jest prosodia?",
            "a": "Czas, akcent, intonacja, energia, rytm, vibrato, frazowanie i inne cechy wykonania ponad samą sekwencją fonemów."
      },
      {
            "id": "bank-238",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 238,
            "q": "Co to jest embedding?",
            "a": "Uczony wektor reprezentujący dyskretny token, głos, styl lub język. Podobne elementy mogą otrzymać podobne reprezentacje."
      },
      {
            "id": "bank-239",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 239,
            "q": "Jak działa self-attention?",
            "a": "Każda pozycja tworzy query, key i value. Iloczyny query–key wyznaczają wagi, którymi agregowane są values innych pozycji."
      },
      {
            "id": "bank-240",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 240,
            "q": "Co to jest multi-head attention?",
            "a": "Kilka niezależnych mechanizmów attention analizujących różne podprzestrzenie cech i typy zależności. Wyniki głów są łączone."
      },
      {
            "id": "bank-241",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 241,
            "q": "Dlaczego Transformer potrzebuje maski paddingu?",
            "a": "Sekwencje w batchu mają różne długości. Maska uniemożliwia attention korzystanie z dopełnionych, sztucznych pozycji."
      },
      {
            "id": "bank-242",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 242,
            "q": "Co to jest sinusoidalne kodowanie pozycyjne?",
            "a": "Deterministyczne wektory sinusów i cosinusów o różnych częstotliwościach dodawane do cech, aby model znał kolejność i względne odległości."
      },
      {
            "id": "bank-243",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 243,
            "q": "Co to jest length regulator?",
            "a": "Mechanizm rozszerzający reprezentację zdarzenia do liczby ramek wynikającej z duration. Powtarza wektor fonemu lub nuty zgodnie z czasem."
      },
      {
            "id": "bank-244",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 244,
            "q": "Czym model autoregresyjny różni się od nieautoregresyjnego?",
            "a": "Autoregresyjny generuje kolejne elementy zależnie od poprzednich i jest wolniejszy. Nieautoregresyjny generuje wiele pozycji równolegle, zwykle potrzebując jawnych czasów."
      },
      {
            "id": "bank-245",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 245,
            "q": "Co to jest Conformer?",
            "a": "Architektura łącząca self-attention dla globalnego kontekstu z modułem konwolucyjnym dla lokalnych zależności czasowych."
      },
      {
            "id": "bank-246",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 246,
            "q": "Co to jest depthwise convolution?",
            "a": "Osobna konwolucja dla każdego kanału. Jest tańsza od pełnej konwolucji i w Conformerze modeluje lokalny kontekst czasowy."
      },
      {
            "id": "bank-247",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 247,
            "q": "Co to jest GLU?",
            "a": "Gated Linear Unit dzieli kanały na część treści i bramkę sigmoid, która kontroluje przepływ informacji."
      },
      {
            "id": "bank-248",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 248,
            "q": "Co to jest score F0?",
            "a": "Krzywa częstotliwości podstawowej wynikająca bezpośrednio z wysokości nut i ich czasu, po uwzględnieniu transpozycji i przejść."
      },
      {
            "id": "bank-249",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 249,
            "q": "Co to jest predicted F0?",
            "a": "Krzywa przewidziana przez model akustyczny, zwykle jako odchylenie względem partytury. Może zawierać mikroprozodię, ale też błędy wysokości."
      },
      {
            "id": "bank-250",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 250,
            "q": "Co to jest blend F0?",
            "a": "Mieszanka score F0 i predicted F0. Ma łączyć kontrolę melodii z naturalnością, lecz w eksperymencie dawała większy błąd niż score F0."
      },
      {
            "id": "bank-251",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 251,
            "q": "Co to jest score-relative F0?",
            "a": "Model przewiduje odchylenie w centach względem wysokości partytury, zamiast częstotliwości bezwzględnej."
      },
      {
            "id": "bank-252",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 252,
            "q": "Dlaczego ogranicza się maksymalne odchylenie F0?",
            "a": "Chroni melodię przed dużymi błędami i stabilizuje trening. Model nadal może przewidywać vibrato i łagodne przejścia."
      },
      {
            "id": "bank-253",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 253,
            "q": "Co to jest teacher forcing?",
            "a": "Podawanie wartości referencyjnej zamiast własnej predykcji modelu jako wejścia kolejnego etapu podczas treningu."
      },
      {
            "id": "bank-254",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 254,
            "q": "Co to jest exposure bias?",
            "a": "Różnica pomiędzy treningiem z idealnymi wejściami a inferencją z własnymi błędnymi predykcjami. Może powodować kumulowanie błędów."
      },
      {
            "id": "bank-255",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 255,
            "q": "Co to jest postnet?",
            "a": "Sieć konwolucyjna przewidująca residualną poprawkę do bazowego mel-spektrogramu."
      },
      {
            "id": "bank-256",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 256,
            "q": "Co to jest residualny mel refiner?",
            "a": "Dodatkowa sieć korygująca mel po głównym modelu i postnecie. Uczy się poprawki, a nie całej reprezentacji od zera."
      },
      {
            "id": "bank-257",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 257,
            "q": "Dlaczego residualne wyjście inicjalizuje się zerami?",
            "a": "Na początku refiner nie zmienia istniejącej predykcji. Trening może stopniowo nauczyć bezpieczną poprawkę bez natychmiastowego pogorszenia bazowego modelu."
      },
      {
            "id": "bank-258",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 258,
            "q": "Co to jest wokoder?",
            "a": "Model lub algorytm zamieniający reprezentację akustyczną, np. mel-spektrogram, na waveform."
      },
      {
            "id": "bank-259",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 259,
            "q": "Jak działa HiFi-GAN?",
            "a": "Generator zwiększa rozdzielczość czasową mel do waveformu, a dyskryminatory wielookresowe i wieloskalowe uczą go realistycznej periodyczności i szczegółów sygnału."
      },
      {
            "id": "bank-260",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 260,
            "q": "Co to jest GAN?",
            "a": "Układ generatora i dyskryminatora. Generator tworzy próbki, a dyskryminator odróżnia je od prawdziwych. Oba modele uczą się w konkurencyjnym procesie."
      },
      {
            "id": "bank-261",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 261,
            "q": "Co to jest generator adversarial loss?",
            "a": "Kara dla generatora, gdy dyskryminator rozpoznaje wygenerowany sygnał jako fałszywy."
      },
      {
            "id": "bank-262",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 262,
            "q": "Co to jest discriminator loss?",
            "a": "Kara, gdy dyskryminator źle klasyfikuje prawdziwe lub wygenerowane próbki."
      },
      {
            "id": "bank-263",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 263,
            "q": "Co to jest feature matching loss?",
            "a": "Różnica pomiędzy pośrednimi aktywacjami dyskryminatora dla realnego i generowanego audio. Stabilizuje GAN i promuje zgodność strukturalną."
      },
      {
            "id": "bank-264",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 264,
            "q": "Co to jest Multi-Period Discriminator?",
            "a": "Zestaw dyskryminatorów analizujących waveform po ułożeniu go według różnych okresów. Jest wrażliwy na strukturę harmoniczną i periodyczność głosu."
      },
      {
            "id": "bank-265",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 265,
            "q": "Co to jest Multi-Scale Discriminator?",
            "a": "Analizuje sygnał przy kilku rozdzielczościach czasowych, dzięki czemu widzi lokalne detale i szerszą obwiednię."
      },
      {
            "id": "bank-266",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 266,
            "q": "Co to jest mel sub-band discriminator?",
            "a": "Dyskryminator analizujący oddzielne zakresy pasm mel. Może zwiększyć nacisk na wysokie częstotliwości i lokalny detal widma."
      },
      {
            "id": "bank-267",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 267,
            "q": "Co to jest multi-resolution STFT loss?",
            "a": "Porównanie spektrogramów przy kilku rozmiarach FFT, oknach i hopach. Łączy ocenę lokalnego i szerszego kontekstu czasowo-częstotliwościowego."
      },
      {
            "id": "bank-268",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 268,
            "q": "Co to jest source-filter model głosu?",
            "a": "Model, w którym źródło pobudzenia krtaniowego jest filtrowane przez trakt głosowy. Źródło kontroluje pitch, a filtr głównie barwę i formanty."
      },
      {
            "id": "bank-269",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 269,
            "q": "Jak działa harmoniczne źródło w wokoderze?",
            "a": "Z F obliczana jest faza sinusoidy i jej harmoniczne. Są one maskowane dla ramek unvoiced i 0 dodawane jako warunek na etapach generatora."
      },
      {
            "id": "bank-270",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 270,
            "q": "Dlaczego ogranicza się harmoniczne względem Nyquista?",
            "a": "Harmoniczne powyżej Nyquista powodowałyby aliasing i fałszywe składowe."
      },
      {
            "id": "bank-271",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 271,
            "q": "Co to jest pitch-shift sensitivity loss?",
            "a": "Strata wymagająca, aby celowa zmiana warunku F0 powodowała mierzalną zmianę wyniku. Zapobiega ignorowaniu pitch przez wokoder."
      },
      {
            "id": "bank-272",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 272,
            "q": "Co to jest acoustic–vocoder mismatch?",
            "a": "Wokoder trenuje się na prawdziwych melach, ale w inferencji dostaje niedoskonałe mele przewidywane. Różnica rozkładu może pogarszać audio."
      },
      {
            "id": "bank-273",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 273,
            "q": "Jak zmniejszono acoustic–vocoder mismatch w pracy?",
            "a": "Wokoder dostrojono na mel-spektrogramach generowanych przez finalny model akustyczny, a nie wyłącznie na reprezentacjach referencyjnych."
      },
      {
            "id": "bank-274",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 274,
            "q": "Co to jest audio-proxy validation?",
            "a": "Model akustyczny generuje mel, wokoder generuje audio, a z audio ponownie liczy się mel i porównuje z referencją. Metryka obejmuje oba modele."
      },
      {
            "id": "bank-275",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 275,
            "q": "Dlaczego audio-proxy nadal nie zastępuje odsłuchu?",
            "a": "Dwa sygnały o podobnym mel mogą różnić się fazą, artefaktami, zrozumiałością, naturalnością i barwą. Metryka numeryczna jest tylko przybliżeniem percepcji."
      },
      {
            "id": "bank-276",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 276,
            "q": "Co to jest vibrato?",
            "a": "Okresowa modulacja F0, opisywana szybkością w Hz i głębokością w centach. Zbyt duże vibrato brzmi niestabilnie, zbyt małe może być niesłyszalne."
      },
      {
            "id": "bank-277",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 277,
            "q": "Co to jest pitch drift?",
            "a": "Powolne odchylenie wysokości w czasie. Niewielkie może zwiększać naturalność, duże brzmi jak fałszowanie."
      },
      {
            "id": "bank-278",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 278,
            "q": "Co to jest onset pitch scoop?",
            "a": "Krótkie rozpoczęcie nuty poniżej lub powyżej wysokości docelowej i dojście do niej. Jest cechą wykonawczą, ale wymaga ostrożnej kontroli."
      },
      {
            "id": "bank-279",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 279,
            "q": "Dlaczego transpozycja może być potrzebna?",
            "a": "Melodia może wychodzić poza zakres wysokości widziany dla danego głosu podczas treningu. Transpozycja przenosi ją do stabilniejszego zakresu."
      },
      {
            "id": "bank-280",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 280,
            "q": "Jaka jest wada transpozycji?",
            "a": "Zmienia tonację i może być muzycznie niepożądana. Przy bezpośrednim pitch-shifcie audio może też zmieniać formanty i barwę."
      },
      {
            "id": "bank-281",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 281,
            "q": "Co to jest MOS?",
            "a": "Mean Opinion Score: średnia subiektywna ocena, zwykle w skali 1–5, np. naturalności audio."
      },
      {
            "id": "bank-282",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 282,
            "q": "Co to jest CMOS?",
            "a": "Comparative MOS: ocena preferencji lub różnicy pomiędzy dwiema próbkami, np. od -3 do +3."
      },
      {
            "id": "bank-283",
            "topic": "Bank 37+: audio i SVS",
            "sourceQuestion": 283,
            "q": "Jak poprawnie wykonać test percepcyjny?",
            "a": "Zaślepić i zrandomizować próbki, użyć wielu utworów i słuchaczy, rozdzielić kryteria oceny, zebrać metadane o słuchaczach oraz raportować średnie, wariancję i przedziały ufności. 9. Pytania o integrację, testowanie i rozwój systemu"
      },
      {
            "id": "bank-284",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 284,
            "q": "Po co zapisuje się konfigurację razem z checkpointem?",
            "a": "Wagi mają sens tylko w połączeniu z architekturą, vocabem, normalizacją, listą głosów, stylów i parametrami cech. Bez tego inferencja może być niezgodna."
      },
      {
            "id": "bank-285",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 285,
            "q": "Dlaczego vocab.json musi pasować do checkpointu?",
            "a": "Indeksy embeddingów odpowiadają konkretnym tokenom. Inny vocab przypisałby tym samym indeksom inne fonemy."
      },
      {
            "id": "bank-286",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 286,
            "q": "Dlaczego stats.json musi pasować do modelu?",
            "a": "Model był uczony na cechach znormalizowanych konkretną średnią i odchyleniem. Inne statystyki zmieniają skalę wejścia i wyjścia."
      },
      {
            "id": "bank-287",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 287,
            "q": "Co to jest checkpoint compatibility?",
            "a": "Zgodność wag z architekturą, wymiarami, słownikiem, normalizacją i wersją przygotowania danych."
      },
      {
            "id": "bank-288",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 288,
            "q": "Co to jest test jednostkowy?",
            "a": "Test małego fragmentu logiki w izolacji, np. konwersji osi czasu, kodowania tokenów lub naprawy taktu."
      },
      {
            "id": "bank-289",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 289,
            "q": "Co to jest test integracyjny?",
            "a": "Sprawdza współpracę kilku modułów i zgodność ich kontraktów, np. OMR–Score IR–SVS CSV."
      },
      {
            "id": "bank-290",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 290,
            "q": "Co to jest test end-to-end?",
            "a": "Uruchamia pełny przepływ od wejścia użytkownika do końcowego wyniku."
      },
      {
            "id": "bank-291",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 291,
            "q": "Co to jest test regresji?",
            "a": "Sprawdza, czy wcześniej działający przypadek nadal daje oczekiwany wynik po zmianach kodu lub modelu. Golden set jest naturalną podstawą takich testów."
      },
      {
            "id": "bank-292",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 292,
            "q": "Dlaczego oracle jest przydatne w testach?",
            "a": "Pozwala zastąpić wynik jednego modułu poprawną referencją i sprawdzić, czy problem pozostaje w dalszej części pipeline’u."
      },
      {
            "id": "bank-293",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 293,
            "q": "Jak mierzyć propagację błędów?",
            "a": "Porównywać warianty z kolejno zastępowanymi modułami oracle i mierzyć zmianę jakości Score IR, MIDI i audio."
      },
      {
            "id": "bank-294",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 294,
            "q": "Jak przekazywać niepewność pomiędzy modułami?",
            "a": "Zachowywać confidence, alternatywne hipotezy i źródła decyzji zamiast tylko twardej etykiety. Warstwa interpretacji może wykorzystywać reguły i kontekst do wyboru hipotezy."
      },
      {
            "id": "bank-295",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 295,
            "q": "Co to jest kalibracja modelu?",
            "a": "Zgodność confidence z rzeczywistą częstością poprawnych predykcji. Model z confidence 0,8 powinien mieć około 80% poprawnych przypadków w tej grupie."
      },
      {
            "id": "bank-296",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 296,
            "q": "Jak można umożliwić ręczną korektę?",
            "a": "Interfejs może pozwalać przesuwać boxy, zmieniać klasy, wysokości, czasy i tekst, a następnie ponownie generować tylko Score IR i audio bez uruchamiania modeli obrazu."
      },
      {
            "id": "bank-297",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 297,
            "q": "Jak poprawić odporność na nowe wydawnictwa nutowe?",
            "a": "Zebrać dane z różnych źródeł, zastosować fine-tuning, style augmentation, normalizację odstępu pięciolinii, aktywne uczenie i analizę błędów per domena."
      },
      {
            "id": "bank-298",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 298,
            "q": "Jak poprawić wydajność pipeline’u?",
            "a": "Batchowanie kafli i cropów, mniejsze lub skompresowane modele, cache, mixed precision, równoległość etapów niezależnych, ONNX/TensorRT oraz adaptacyjne pomijanie zbędnych modułów."
      },
      {
            "id": "bank-299",
            "topic": "Bank 37+: integracja i rozwój",
            "sourceQuestion": 299,
            "q": "Jakie byłyby następne trzy najważniejsze eksperymenty?",
            "a": "Real-world test set partytur wokalnych; uczciwy wieloseedowy protokół OMR z osobnym validation/test; zaślepiona ewaluacja percepcyjna SVS z baseline’ami."
      },
      {
            "id": "zagadnienia-001",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-001",
            "q": "Gdzie w systemie znajduje się najważniejsza luka reprezentacyjna?",
            "a": "Obraz partytury jest strukturą dwuwymiarową i relacyjną, natomiast SVS oczekuje uporządkowanej osi czasu: fonemów, wysokości, czasów trwania, pauz i cech prozodycznych. Najważniejszym zadaniem nie jest więc sama detekcja obiektów, lecz przejście od geometrii strony do semantyki muzycznej i sekwencji czasowej. Rolę pomostu pełni Score IR."
      },
      {
            "id": "zagadnienia-002",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-002",
            "q": "Dlaczego Score IR jest czymś więcej niż formatem technicznym?",
            "a": "Score IR pełni jednocześnie rolę kontraktu między modułami i narzędzia badawczego. Zachowuje surowe źródła, confidence, symbole, relacje, ostrzeżenia i naprawy, dzięki czemu można odróżnić błąd percepcji obrazu od błędu interpretacji muzycznej. Minimalny CSV dla SVS usuwałby większość tej informacji i utrudniał diagnozę."
      },
      {
            "id": "zagadnienia-003",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-003",
            "q": "Dlaczego ewaluacja SVS nie pozwala jeszcze mówić o jakości użytkowej?",
            "a": "Golden set ma tylko dziesięć próbek, a główna metryka ocenia zgodność F0, nie pełną naturalność. Nie wykonano szerokiego testu MOS lub CMOS z grupą słuchaczy, nie rozdzielono systematycznie ocen naturalności, zrozumiałości tekstu, barwy, podobieństwa głosu i jakości frazowania. Wynik dowodzi działania i kontroli melodii w prototypie, ale nie równoważności z gotowym produktem."
      },
      {
            "id": "zagadnienia-004",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-004",
            "q": "Czy zrealizowany system jest produktem?",
            "a": "Nie. Jest kompletnym prototypem badawczo-inżynierskim: działa od obrazu lub PDF-u do artefaktów muzycznych i audio, pozwala trenować, porównywać i diagnozować moduły. Produkt wymagałby znacznie większej odporności domenowej, stabilności, ergonomicznej korekty błędów, testów użytkowników, kontroli jakości, wydajności oraz szerszej ewaluacji percepcyjnej."
      },
      {
            "id": "zagadnienia-005",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-005",
            "q": "Czy lepiej byłoby ograniczyć pracę do jednego modułu?",
            "a": "Węższa praca pozwoliłaby pogłębić jeden komponent i wykonać więcej powtórzeń eksperymentów. Jednak celem tej pracy było zbadanie pełnego przejścia od obrazu do śpiewu i obserwowalności modułowego systemu. Szeroki zakres był więc zgodny z celem, choć jego ceną jest nierówna dojrzałość modułów, zwłaszcza ograniczona ewaluacja SVS."
      },
      {
            "id": "zagadnienia-006",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-006",
            "q": "Jaki był wkład Michała Bobera?",
            "a": "Przetwarzanie obrazu i tekstu: lokalizacja tekstu, OCR, OMR, przygotowanie DeepScoresV2, konfiguracja i eksperymenty Faster R-CNN, obrazy i PDF-y, kafelkowanie, augmentacje, ewaluacja detekcji oraz integracja wyników obrazu w aplikacji."
      },
      {
            "id": "zagadnienia-007",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-007",
            "q": "Jaki był wkład Igora Staręgi?",
            "a": "Interpretacja muzyczna, Score IR, przejście od symboli do melodii i rytmu, synchronizacja tekstu z nutami, przygotowanie formatu dla SVS, model akustyczny, wokoder, ewaluacja muzyczna i wokalna oraz diagnostyka toru syntezy."
      },
      {
            "id": "zagadnienia-008",
            "topic": "Bank 37+: PDF - wspólne i zakres",
            "sourceQuestion": "PDF-008",
            "q": "Dlaczego nie zastosowano jednego modelu end-to-end?",
            "a": "Wymagałby dużego zbioru par obraz partytury-docelowy wokal oraz nauczenia w jednym modelu percepcji dokumentu, semantyki muzycznej, wymowy i generacji audio. Taki zbiór jest trudny do pozyskania, a model byłby słabo obserwowalny. Podejście modułowe lepiej odpowiadało dostępnym danym i celowi badawczemu."
      },
      {
            "id": "zagadnienia-009",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-009",
            "q": "Dlaczego segmentacja zamiast samych bounding boxów?",
            "a": "Tekst wokalny składa się z cienkich i nieregularnych struktur. Maska lepiej odwzorowuje kształt niż prostokąt, ogranicza ilość tła w cropie i może służyć do maskowania tekstu przed OMR. Bounding box jest prostszy, ale obejmuje puste przestrzenie, pięciolinie i symbole."
      },
      {
            "id": "zagadnienia-010",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-010",
            "q": "Po co skip connections?",
            "a": "Podczas downsamplingu mogą zniknąć cienkie kreski liter i dokładne położenie granic. Skip connections dostarczają decoderowi cechy o wyższej rozdzielczości, dzięki czemu może odtworzyć drobne elementy maski."
      },
      {
            "id": "zagadnienia-011",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-011",
            "q": "Co rzeczywiście robi attention gate?",
            "a": "Uczy się przestrzennie wzmacniać cechy istotne dla segmentowanego tekstu i tłumić tło. Nie \"czyta\" tekstu i nie jest modelem językowym. Jest mechanizmem selekcji cech."
      },
      {
            "id": "zagadnienia-012",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-012",
            "q": "Dlaczego nie użyć zwykłego accuracy?",
            "a": "Większość strony jest tłem. Model przewidujący wszędzie tło mógłby osiągnąć wysokie accuracy, ale nie znaleźć żadnego tekstu. Precision, recall, F1, IoU i Dice lepiej oceniają klasę mniejszościową."
      },
      {
            "id": "zagadnienia-013",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-013",
            "q": "Czy jest to system czysto neuronowy?",
            "a": "Nie. Predykcja maski jest neuronowa, ale jej wykorzystanie jest wspierane heurystykami opartymi na geometrii pięciolinii i typowym położeniu tekstu wokalnego. Jest to system hybrydowy. Pułapka: Heurystyka \"tekst znajduje się pod pięciolinią\" nie jest uniwersalna. Może zawieść dla wielu zwrotek, nietypowego układu, tekstu pomiędzy głosami, partytur chóralnych i opisów umieszczonych w podobnej strefie."
      },
      {
            "id": "zagadnienia-014",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-014",
            "q": "Jak poprawić generalizację lokalizacji tekstu?",
            "a": "Przygotować anotowany zbiór partytur wokalnych, generować syntetyczne partytury z maskami, zastosować fine-tuning lub domain adaptation, użyć pretrenowanego encodera, dodać bardziej realistyczne degradacje i mierzyć wynik bezpośrednio na pełnych stronach nutowych."
      },
      {
            "id": "zagadnienia-015",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-015",
            "q": "Jaka jest różnica między segmentacją semantyczną i instancyjną?",
            "a": "Segmentacja semantyczna przypisuje klasę każdemu pikselowi, ale nie rozdziela osobnych obiektów tej samej klasy. Segmentacja instancyjna dodatkowo identyfikuje oddzielne wystąpienia, np. osobne słowa lub wiersze."
      },
      {
            "id": "zagadnienia-016",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-016",
            "q": "Co się stanie przy zbyt niskim progu maski?",
            "a": "Wzrośnie recall, ale pojawi się więcej fałszywych pikseli i regionów, które mogą zawierać symbole muzyczne. Zbyt wysoki próg zwiększy precision kosztem przerwanych lub pominiętych liter."
      },
      {
            "id": "zagadnienia-017",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-017",
            "q": "Czy wysoki recall zawsze jest pożądany?",
            "a": "Nie. Jeżeli uzyskano go przez oznaczenie dużej części tła jako tekstu, OCR dostanie zaszumione cropy, a maskowanie przed OMR może usunąć symbole muzyczne."
      },
      {
            "id": "zagadnienia-018",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-018",
            "q": "Dlaczego usuwanie pięciolinii może być ryzykowne?",
            "a": "Operacja może usunąć fragmenty liter przecinające się z wykrytymi liniami albo uszkodzić znaki, jeśli geometria pięciolinii została oszacowana błędnie."
      },
      {
            "id": "zagadnienia-019",
            "topic": "Bank 37+: PDF - lokalizacja tekstu",
            "sourceQuestion": "PDF-019",
            "q": "Jak ocenić cały moduł, a nie sam segmenter?",
            "a": "Należy mierzyć nie tylko IoU maski, ale także wykrycie kompletnych wierszy, kompletność cropów, kolejność odczytu i wpływ na CER, sylabizację oraz końcowe dopasowanie tekstu do nut."
      },
      {
            "id": "zagadnienia-020",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-020",
            "q": "Dlaczego oś pozioma obrazu jest osią czasu?",
            "a": "W tekstach poziomych kolejność znaków odpowiada przesuwaniu się od lewej do prawej. CNN kompresuje wysokość obrazu, pozostawiając kolejne kolumny cech jako uporządkowaną sekwencję obserwacji."
      },
      {
            "id": "zagadnienia-021",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-021",
            "q": "Co daje BiLSTM?",
            "a": "Każda pozycja korzysta zarówno z kontekstu po lewej, jak i po prawej. W OCR cały obraz jest dostępny, więc nie ma wymogu przetwarzania przyczynowego."
      },
      {
            "id": "zagadnienia-022",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-022",
            "q": "Dlaczego Transformer nie wygrał?",
            "a": "Większa złożoność nie gwarantuje poprawy. Model był trenowany od zera, zadanie miało stosunkowo krótkie sekwencje i silną lokalną strukturę, a dane oraz jakość cropów mogły być ważniejszym ograniczeniem niż pojemność modelu. BiLSTM ma korzystny inductive bias dla monotonicznego tekstu."
      },
      {
            "id": "zagadnienia-023",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-023",
            "q": "Po co blank?",
            "a": "Pozwala reprezentować brak znaku i rozdzielić powtarzające się litery. Bez blanku sekwencja dwóch identycznych liter mogłaby zostać zredukowana do jednej."
      },
      {
            "id": "zagadnienia-024",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-024",
            "q": "Jakie główne założenie ma CTC?",
            "a": "Kolejność etykiet jest monotoniczna względem sekwencji wejściowej. CTC nie jest odpowiednie do swobodnej zmiany kolejności znaków."
      },
      {
            "id": "zagadnienia-025",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-025",
            "q": "Czy CER może być większy od 1?",
            "a": "Tak. Jeżeli model generuje bardzo dużo dodatkowych znaków, liczba wstawień może przekroczyć długość referencji."
      },
      {
            "id": "zagadnienia-026",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-026",
            "q": "Dlaczego exact match jest ważny dla tej pracy?",
            "a": "Pojedynczy błąd w spacji, myślniku lub sylabie może zmienić późniejsze dopasowanie tekstu do nut, mimo że globalny CER pozostaje niski."
      },
      {
            "id": "zagadnienia-027",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-027",
            "q": "Czy użycie PaddleOCR w aplikacji podważa sens trenowania własnego OCR?",
            "a": "Nie. Własne modele pozwoliły przeprowadzić kontrolowane badanie architektur i CTC, natomiast aplikacja została zaprojektowana modułowo i może korzystać z praktycznie najlepszego dostępnego backendu. Badanie naukowe i wybór produkcyjny nie muszą wskazywać tego samego modelu."
      },
      {
            "id": "zagadnienia-028",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-028",
            "q": "Dlaczego zachowuje się proporcje obrazu?",
            "a": "Rozciągnięcie słowa zmienia geometrię znaków i odstępy. Skalowanie do stałej wysokości z dopełnieniem szerokości zachowuje kształt, a jednocześnie daje stały rozmiar tensora."
      },
      {
            "id": "zagadnienia-029",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-029",
            "q": "Co oznacza CER równy 0,1318?",
            "a": "Średnia liczba operacji edycyjnych odpowiada około 13,18% liczby znaków referencyjnych. Nie oznacza to jednak, że dokładnie 13,18% znaków w każdej próbce jest błędne."
      },
      {
            "id": "zagadnienia-030",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-030",
            "q": "Czy można mieć niski CER i bezużyteczny wynik dla SVS?",
            "a": "Tak. Błędy mogą koncentrować się w myślnikach, spacjach i granicach sylab, które mają większy wpływ muzyczny niż przypadkowa literówka."
      },
      {
            "id": "zagadnienia-031",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-031",
            "q": "Jak uczciwie ocenić sam OCR?",
            "a": "Na referencyjnych cropach, aby wyłączyć błędy lokalizacji. Osobno należy ocenić pełny tor lokalizacja+OCR na całych stronach."
      },
      {
            "id": "zagadnienia-032",
            "topic": "Bank 37+: PDF - OCR",
            "sourceQuestion": "PDF-032",
            "q": "Dlaczego WER nie był główną metryką?",
            "a": "Próbki są często krótkie i zawierają fragmenty lub sylaby. CER daje bardziej szczegółową informację znakową. WER byłby wartościową metryką dodatkową dla pełnych wierszy tekstu."
      },
      {
            "id": "zagadnienia-033",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-033",
            "q": "Dlaczego wybrano DeepScoresV2?",
            "a": "Jest jednym z największych zbiorów do detekcji drukowanych symboli muzycznych, zawiera 136 klas oraz informacje o ramkach zorientowanych. Dobrze odpowiada zadaniu detekcji obiektowej, choć wymaga augmentacji i testów domenowych."
      },
      {
            "id": "zagadnienia-034",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-034",
            "q": "Dlaczego detektor dwustopniowy?",
            "a": "Zapewnia dobrą jakość lokalizacji i oddziela generowanie regionów od dokładnej klasyfikacji. Jest odpowiedni dla gęstych, małych symboli, choć jest wolniejszy i kosztowniejszy od detektorów one-stage."
      },
      {
            "id": "zagadnienia-035",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-035",
            "q": "Dlaczego GroupNorm zamiast BatchNorm?",
            "a": "Trening używa batch size 1. BatchNorm miałby bardzo niestabilne statystyki batcha. GroupNorm normalizuje grupy kanałów wewnątrz próbki i nie zależy od liczby obrazów w batchu."
      },
      {
            "id": "zagadnienia-036",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-036",
            "q": "Dlaczego trenowanie od zera mogło mieć sens?",
            "a": "Partytury są geometrycznymi, prawie binarnymi dokumentami odmiennymi od ImageNet. Własny backbone dawał pełną kontrolę nad stride’em i małymi obiektami."
      },
      {
            "id": "zagadnienia-037",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-037",
            "q": "Jaka jest wada braku pretreningu?",
            "a": "Model nie korzysta z wcześniej nauczonych filtrów, potrzebuje więcej danych i czasu, a przy ograniczonym zbiorze może generalizować gorzej. Sensownym baseline’em byłby pretrenowany ResNet z FPN."
      },
      {
            "id": "zagadnienia-038",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-038",
            "q": "Co się stanie, gdy anchors są źle dobrane?",
            "a": "Ich IoU z ground truth będzie niskie, RPN otrzyma mniej dobrych pozytywnych przykładów, a małe lub ekstremalnie wydłużone obiekty mogą nie generować dobrych proposals."
      },
      {
            "id": "zagadnienia-039",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-039",
            "q": "Jak może jednocześnie wzrosnąć precision i spaść recall?",
            "a": "Model generuje mniej fałszywych predykcji, ale pomija więcej prawdziwych obiektów. Może to wynikać ze zmiany rozkładu confidence i jakości proposal, a nie tylko z samej zdolności widzenia szczegółów."
      },
      {
            "id": "zagadnienia-040",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-040",
            "q": "Dlaczego mniejszy kafel może pomóc?",
            "a": "Po przeskalowaniu do wejścia sieci symbol zajmuje względnie więcej pikseli, więc drobne detale są łatwiejsze do rozpoznania. Ceną jest mniejszy kontekst."
      },
      {
            "id": "zagadnienia-041",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-041",
            "q": "Dlaczego duży kafel nie zawsze pomaga długim obiektom?",
            "a": "Większy kontekst zmniejsza względny rozmiar lokalnych cech. Dla beam, tie i slur rozdzielczość detalu mogła być ważniejsza niż pełna długość symbolu. Staff było wyjątkiem i korzystało z szerokiego kontekstu."
      },
      {
            "id": "zagadnienia-042",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-042",
            "q": "Czy jest to pełny rotated Faster R-CNN?",
            "a": "Nie. Podstawowy detector nadal generuje axis-aligned proposals i boxy. Wielokąt zorientowany jest dodatkową regresją dla wykrytego regionu."
      },
      {
            "id": "zagadnienia-043",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-043",
            "q": "Dlaczego IoU jest problematyczne dla małych obiektów?",
            "a": "Przesunięcie ramki o kilka pikseli może stanowić dużą część jej rozmiaru i gwałtownie obniżyć IoU, mimo że lokalizacja nadal jest użyteczna dla interpretacji."
      },
      {
            "id": "zagadnienia-044",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-044",
            "q": "Co oznacza wysokie AP50 i niższe AP75?",
            "a": "Model zazwyczaj znajduje obiekt, ale jego ramka nie jest wystarczająco dokładna przy bardziej rygorystycznym wymaganiu lokalizacji."
      },
      {
            "id": "zagadnienia-045",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-045",
            "q": "Dlaczego mean IoU i oriented L1 nie wystarczą?",
            "a": "Są liczone tylko dla dopasowanych predykcji. Model może mieć dobre ramki dla niewielkiej liczby wykrytych obiektów, a jednocześnie niski recall."
      },
      {
            "id": "zagadnienia-046",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-046",
            "q": "Czy augmentacje dowodzą odporności na zdjęcia?",
            "a": "Nie. Dowodzą odporności na zdefiniowany rozkład syntetycznych degradacji. Prawdziwe zdjęcia mogą zawierać inne kombinacje cieni, perspektywy, zagięć, ostrości, papieru i fontów."
      },
      {
            "id": "zagadnienia-047",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-047",
            "q": "Dlaczego support nie wyjaśnia całego wyniku?",
            "a": "Rzadkie klasy mają mało danych, lecz częste klasy także mogą być trudne ze względu na geometrię, podobieństwo do innych symboli, zależność od kontekstu lub przecięcie granicą kafla. Przykładem są stem i ledgerLine."
      },
      {
            "id": "zagadnienia-048",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-048",
            "q": "Dlaczego stem może być mylony z barline?",
            "a": "Oba są cienkimi, pionowymi strukturami. Rozróżnienie wymaga kontekstu: stem łączy się z notehead i beam/flag, a barline przecina wysokość jednej lub kilku pięciolinii."
      },
      {
            "id": "zagadnienia-049",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-049",
            "q": "Jak powinien wyglądać poprawiony podział train/validation/test w OMR?",
            "a": "Train do uczenia, osobny validation do wyboru checkpointu i hiperparametrów oraz nietykany test użyty dopiero do końcowej oceny."
      },
      {
            "id": "zagadnienia-050",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-050",
            "q": "Jak uczciwiej porównać rozmiary kafli?",
            "a": "Utrzymać stałą liczbę optimizer steps, liczbę obejrzanych obiektów lub równoważny koszt obliczeniowy, a następnie wykonać wiele seedów."
      },
      {
            "id": "zagadnienia-051",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-051",
            "q": "Dlaczego val loss nie odpowiadał rankingowi mAP?",
            "a": "Strata treningowa jest sumą lokalnych strat RPN, klasyfikacji i regresji, a mAP zależy od rankingów confidence, NMS, progów IoU i wyników wszystkich klas. Niższa strata nie musi oznaczać lepszej metryki końcowej."
      },
      {
            "id": "zagadnienia-052",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-052",
            "q": "Dlaczego próg confidence wynosił tylko 0,05?",
            "a": "W gęstej detekcji małych symboli niski próg zwiększa recall i pozwala krzywej precision-recall ocenić szeroki zakres confidence. Późniejsze filtrowanie i NMS usuwają część słabych predykcji."
      },
      {
            "id": "zagadnienia-053",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-053",
            "q": "Czy najwyższy mAP gwarantuje najlepszy Score IR?",
            "a": "Nie. mAP waży klasy i progi detekcyjne, ale błędy nie mają równego znaczenia muzycznego. Pominięty notehead, clef lub accidental może być ważniejszy niż błąd symbolu niewykorzystywanego przez obecny SVS."
      },
      {
            "id": "zagadnienia-054",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-054",
            "q": "Jak zbudować metrykę OMR zorientowaną na wynik muzyczny?",
            "a": "Można mierzyć pitch error, duration error, note precision/recall, poprawność taktów, edit distance sekwencji nut, zgodność MusicXML albo wpływ na MIDI i SVS."
      },
      {
            "id": "zagadnienia-055",
            "topic": "Bank 37+: PDF - OMR",
            "sourceQuestion": "PDF-055",
            "q": "Co byłoby ważniejsze w kolejnym badaniu: wyższy mAP czy mniej błędów melodii?",
            "a": "Dla celu systemu ważniejsza jest semantyczna poprawność melodii i rytmu. mAP pozostaje niezbędną metryką detektora, ale warto zoptymalizować klasy i błędy według ich wpływu na kolejne etapy."
      },
      {
            "id": "zagadnienia-056",
            "topic": "Bank 37+: PDF - Score IR",
            "sourceQuestion": "PDF-056",
            "q": "Dlaczego sama współrzędna y nie wystarcza do wysokości?",
            "a": "Ta sama pozycja graficzna oznacza inną wysokość w różnych kluczach. Potrzebna jest także geometria pięciolinii, informacja o liniach dodanych i znakach chromatycznych."
      },
      {
            "id": "zagadnienia-057",
            "topic": "Bank 37+: PDF - Score IR",
            "sourceQuestion": "PDF-057",
            "q": "Czy synthetic rest jest fałszowaniem wyniku?",

      {

      {

      {

      {

      els.deckBank.addEventListener("click", () => setDeck("bank"));
      els.search.addEventListener("input", () => {
        persistEditingIfNeeded();
        state.index = 0;
        state.answerVisible = false;
        rebuildOrder();
        render();
      });
      els.selectAllTopics.addEventListener("click", () => setAllTopics(true));
      els.clearAllTopics.addEventListener("click", () => setAllTopics(false));
      [els.filterThesis, els.filterMini, els.filterNew, els.filterHard, els.filterBad].forEach(input => {
        input.addEventListener("change", resetFilteredSession);
      });
      els.committeeFilters.all.addEventListener("change", event => {
        setCommitteeFilters(event.target.checked);
      });

        els.committeeFilters[key].addEventListener("change", () => {
          syncCommitteeAllFromDetails();
          resetFilteredSession();
